<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>knod — graph</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>

<body>
  <div id="loading">loading graph…</div>
  <canvas id="canvas"></canvas>
  <div id="query-hint-bottom" class="query-hint query-hint-bottom">Press space to query</div>
  <div id="panel" class="glass">
    <h1>knod graph</h1>
    <div class="stat">thoughts: <b id="s-nodes">—</b></div>
    <div class="stat">edges: <b id="s-edges">—</b></div>
    <div class="stat">dimensions: <b id="s-dimensions">—</b></div>
    <input id="search" type="text" placeholder="search thoughts…" autocomplete="off">
    <div id="search-results"></div>
    <hr class="divider">
    <div class="controls-head">
      <div>
        <div class="controls-title">dimension balance</div>
        <div class="controls-copy">Top graph tags ranked by popularity. Raising one rebalances the others.</div>
      </div>
      <button id="dimension-reset" class="ghost-button" type="button">reset</button>
    </div>
    <div id="dimension-summary" class="controls-summary">balanced</div>
    <div id="dimension-controls" class="controls open"></div>

  </div>
  <div id="detail" class="glass">
    <h2 id="d-title"></h2>
    <div class="d-meta" id="d-meta"></div>
    <div class="d-text" id="d-text"></div>
    <div class="d-edges">
      <h3>connections</h3>
      <div id="d-edge-list"></div>
    </div>
  </div>
  <div id="ask-overlay" class="ask-overlay" aria-hidden="true" hidden>
    <section id="ask-dialog" class="ask-dialog" role="dialog" aria-modal="true" aria-label="Ask knod">
      <div id="ask-stack" class="ask-stack">
        <div id="ask-answer" class="ask-answer" hidden>
          <div class="ask-answer-label">best shot</div>
          <div id="ask-answer-text" class="ask-answer-text"></div>
          <div id="ask-sources-list" class="ask-sources-list"></div>
        </div>
        <div id="ask-thoughts" class="ask-thoughts" hidden>
          <div class="ask-thoughts-label">matching thoughts</div>
          <div id="ask-thoughts-list" class="ask-thoughts-list"></div>
        </div>
      </div>
      <form id="ask-form" class="glass ask-form">
        <input id="ask-input" type="text" placeholder="Ask the graph anything..." autocomplete="off">
        <div id="ask-status" class="ask-status">Type to search thoughts and query the model. Esc closes.</div>
      </form>
    </section>
  </div>

  <script type="module" src="/static/viz.js"></script>
</body>

</html>
