<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>knod — specialist space</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #c8c8d0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}
canvas { display: block; }
#info {
  position: absolute;
  top: 16px;
  left: 16px;
  font-size: 12px;
  line-height: 1.6;
  pointer-events: none;
  opacity: 0.7;
}
#info h1 { font-size: 14px; color: #e0e0e8; margin-bottom: 4px; }
#tooltip {
  position: absolute;
  display: block;
  opacity: 0;
  background: rgba(10, 10, 20, 0.92);
  border: 1px solid rgba(100, 140, 255, 0.3);
  padding: 8px 12px;
  font-size: 11px;
  line-height: 1.5;
  max-width: 380px;
  pointer-events: none;
  border-radius: 4px;
  backdrop-filter: blur(8px);
  transition: opacity 0.2s ease;
}
#tooltip .label { color: #8cb4ff; font-weight: bold; }
#tooltip .detail { color: #a0a0b0; }
#tooltip .source { color: #7a9ab8; font-size: 10px; margin-top: 2px; }
#tooltip .connections { color: #b8a070; font-size: 10px; margin-top: 4px; border-top: 1px solid rgba(100, 140, 255, 0.15); padding-top: 4px; }
#tooltip .connections .edge-item { margin-top: 2px; }
#controls {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-size: 11px;
  opacity: 0.5;
}
#legend {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 11px;
  opacity: 0.7;
}
#legend div { margin-bottom: 4px; }
#legend .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
#fade-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0a0a0f;
  pointer-events: none;
  z-index: 9999;
  opacity: 1;
  transition: opacity 1.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#fade-overlay.done { opacity: 0; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fade-overlay"></div>

<div id="info">
  <h1 id="store-name">specialist</h1>
  <div id="store-purpose"></div>
  <div id="store-stats"></div>
</div>

<div id="tooltip">
  <div class="label"></div>
  <div class="detail"></div>
  <div class="source"></div>
  <div class="connections"></div>
</div>

<div id="legend">
  <div><span class="dot" style="background:#448888"></span>old / root</div>
  <div><span class="dot" style="background:#dd6644"></span>recent</div>
  <div><span class="dot" style="background:#c8a040"></span>edge (connection)</div>
  <div style="margin-top:4px;font-size:10px;opacity:0.6">teal → coral = age gradient</div>
</div>

<div id="controls">
  drag to rotate · scroll to zoom · hover for details
</div>

<script>
// ============================================================
// DATA — replace this section with real data from knod API
// ============================================================

// Mock: simulates a specialist about systems programming
const STORE = {
  name: "systems-programming",
  purpose: "Low-level systems knowledge: OS internals, memory management, compilers, networking",
  thought_count: 0,
  edge_count: 0,
};

// Provenance sources — where knowledge was ingested from
const SOURCES = [
  "ostep-textbook",
  "linux-kernel-docs",
  "rust-nomicon",
  "intel-sdm",
  "research-papers",
  "stack-overflow",
  "man-pages",
];

// Tags: each has dim_index (which embedding dimension it maps to) and a label
// In real knod, these come from graph.tags — the top activated dimensions of the profile
const TAGS = [
  { dim_index: 42,   label: "memory-management" },
  { dim_index: 107,  label: "concurrency" },
  { dim_index: 215,  label: "networking" },
  { dim_index: 330,  label: "file-systems" },
  { dim_index: 401,  label: "compilers" },
  { dim_index: 512,  label: "operating-systems" },
  { dim_index: 678,  label: "data-structures" },
  { dim_index: 755,  label: "algorithms" },
  { dim_index: 890,  label: "cpu-architecture" },
  { dim_index: 1024, label: "type-systems" },
  { dim_index: 1100, label: "garbage-collection" },
  { dim_index: 1200, label: "virtual-memory" },
  { dim_index: 1350, label: "scheduling" },
  { dim_index: 1450, label: "cache-coherence" },
  { dim_index: 80,   label: "linkers" },
  { dim_index: 160,  label: "syscalls" },
  { dim_index: 500,  label: "IPC" },
  { dim_index: 600,  label: "SIMD" },
  { dim_index: 950,  label: "lock-free" },
  { dim_index: 1500, label: "page-tables" },
];

// Realistic thought texts grouped by primary tag affinity
const THOUGHT_TEXTS = [
  // memory-management
  "Stack allocation is O(1) — just bump the stack pointer",
  "malloc uses free lists and memory pools for different size classes",
  "Memory fragmentation occurs when free blocks are non-contiguous",
  "sbrk extends the data segment but mmap is preferred for large allocations",
  "Use-after-free bugs are the most common source of memory corruption",
  "Arena allocators batch-free all allocations at once",
  "The buddy allocator splits and coalesces power-of-two blocks",
  "jemalloc uses thread-local caches to reduce lock contention",
  // concurrency
  "Mutex acquisition requires an atomic compare-and-swap on the lock word",
  "Condition variables must always be used with a mutex to avoid lost wakeups",
  "Deadlock requires mutual exclusion, hold-and-wait, no preemption, and circular wait",
  "Read-write locks allow concurrent readers but exclusive writers",
  "Thread-per-connection doesn't scale past ~10K connections",
  "Futexes are fast userspace mutexes that only syscall on contention",
  "Memory barriers enforce ordering between loads and stores across cores",
  // networking
  "TCP uses a three-way handshake: SYN, SYN-ACK, ACK",
  "Nagle's algorithm batches small writes but adds latency",
  "epoll is edge-triggered and scales to millions of file descriptors",
  "Zero-copy sendfile avoids copying data between kernel and user space",
  "SO_REUSEPORT distributes incoming connections across multiple threads",
  "TCP congestion control uses AIMD: additive increase, multiplicative decrease",
  // file-systems
  "ext4 uses extent trees instead of indirect block pointers",
  "Journaling writes metadata changes to a log before committing",
  "The VFS layer abstracts file system operations behind a common interface",
  "Hard links share the same inode; symlinks are separate inodes with a path",
  "fsync forces dirty pages to disk but fdatasync skips metadata",
  // compilers
  "SSA form ensures each variable is assigned exactly once",
  "Register allocation is NP-complete but graph coloring heuristics work well",
  "Inlining eliminates call overhead but increases code size and I-cache pressure",
  "Tail call optimization reuses the current stack frame for recursive calls",
  "LLVM IR is a typed three-address code in SSA form",
  // operating-systems
  "The kernel maps itself into every process's address space for fast syscalls",
  "Context switching saves and restores registers, stack pointer, and page table base",
  "Interrupt handlers run in interrupt context with no process identity",
  "The OOM killer selects a victim process when physical memory is exhausted",
  "Capabilities split root privilege into fine-grained permissions",
  // data-structures
  "B-trees minimize disk seeks by packing many keys per node",
  "Hash tables have O(1) average lookup but O(n) worst case with collisions",
  "Skip lists are probabilistic alternatives to balanced trees",
  "Bloom filters test set membership with no false negatives but possible false positives",
  "Ring buffers are ideal for fixed-size producer-consumer queues",
  // algorithms
  "Dijkstra's algorithm finds shortest paths in non-negative weighted graphs",
  "Consistent hashing minimizes key redistribution when nodes join or leave",
  "Work-stealing lets idle threads grab tasks from busy threads' deques",
  // cpu-architecture
  "Modern CPUs execute instructions out-of-order using Tomasulo's algorithm",
  "Branch prediction accuracy exceeds 97% on most workloads",
  "The TLB caches virtual-to-physical translations to avoid page table walks",
  "Speculative execution can leak data through timing side channels",
  "Cache lines are typically 64 bytes and aligned to 64-byte boundaries",
  // type-systems
  "Hindley-Milner type inference reconstructs types without annotations",
  "Affine types ensure resources are used at most once (Rust's ownership model)",
  "Dependent types allow types to depend on values, enabling proof-carrying code",
  // garbage-collection
  "Mark-and-sweep traces from roots and frees unmarked objects",
  "Generational GC exploits the weak generational hypothesis: most objects die young",
  "Concurrent GC runs alongside mutators using a tri-color marking invariant",
  "Reference counting can't collect cycles without a cycle detector",
  // virtual-memory
  "Demand paging loads pages from disk only when first accessed",
  "Copy-on-write defers page duplication until a write occurs",
  "Huge pages (2MB/1GB) reduce TLB misses for large working sets",
  "ASLR randomizes memory layout to mitigate ROP attacks",
  // scheduling
  "CFS uses a red-black tree ordered by virtual runtime",
  "Priority inversion occurs when a high-priority task waits on a low-priority lock holder",
  "Real-time scheduling guarantees worst-case response times",
  "CPU affinity pins threads to specific cores to improve cache locality",
  // cache-coherence
  "MESI protocol tracks cache lines as Modified, Exclusive, Shared, or Invalid",
  "False sharing occurs when unrelated data shares a cache line",
  "Write-invalidate sends invalidation messages to all sharers",
  // linkers
  "The linker resolves undefined symbols against object files and libraries",
  "Position-independent code uses GOT/PLT for shared library function calls",
  "Link-time optimization (LTO) inlines across compilation units",
  // syscalls
  "System calls trap from user mode to kernel mode via int 0x80 or syscall instruction",
  "vDSO maps kernel code into user space to avoid syscall overhead for gettimeofday",
  "Seccomp filters restrict which system calls a process can make",
  // IPC
  "Unix domain sockets are faster than TCP loopback for local IPC",
  "Shared memory is the fastest IPC but requires explicit synchronization",
  "Pipes are unidirectional byte streams between related processes",
  // SIMD
  "AVX-512 processes 16 floats or 64 bytes per instruction",
  "Auto-vectorization transforms scalar loops into SIMD operations",
  "Gather instructions load non-contiguous memory into a SIMD register",
  // lock-free
  "CAS loops are the building block of lock-free data structures",
  "The ABA problem occurs when a value is modified and then restored between reads",
  "Hazard pointers protect memory reclamation in lock-free algorithms",
  "RCU defers freeing until all readers have finished their critical sections",
  // page-tables
  "x86-64 uses 4-level page tables: PML4, PDPT, PD, PT",
  "Each page table entry contains the physical frame number and permission bits",
  "Kernel page table isolation (KPTI) mitigates Meltdown by unmapping kernel pages in user mode",
];

// Generate mock thoughts with realistic metadata
function generateMockThoughts(count) {
  const thoughts = [];
  const rng = mulberry32(12345);
  const now = Date.now();
  const DAY = 86400000;

  for (let i = 0; i < count; i++) {
    const affinities = TAGS.map((tag, ti) => {
      const primary = Math.floor(rng() * TAGS.length);
      const secondary = Math.floor(rng() * TAGS.length);
      const base = rng() * 0.15;
      const boost = (ti === primary) ? 0.6 + rng() * 0.3 :
                    (ti === secondary) ? 0.3 + rng() * 0.2 :
                    (Math.abs(ti - primary) <= 2) ? 0.15 + rng() * 0.15 : base;
      return boost;
    });

    // Timestamp: spread over ~90 days, newer thoughts more likely at higher indices
    const age = rng();
    const created_at = now - Math.floor(age * 90 * DAY);
    const last_accessed = created_at + Math.floor(rng() * (now - created_at));

    thoughts.push({
      id: i + 1,
      text: THOUGHT_TEXTS[i % THOUGHT_TEXTS.length],
      affinities: affinities,
      access_count: Math.floor(rng() * 50),
      created_at: created_at,
      last_accessed: last_accessed,
      age: age, // 0 = newest, 1 = oldest (normalized)
      source_id: SOURCES[Math.floor(rng() * SOURCES.length)],
    });
  }
  return thoughts;
}

// Simple seedable PRNG
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

const THOUGHTS = generateMockThoughts(200);

// Edge reasoning templates
const EDGE_REASONINGS = [
  "Both relate to memory hierarchy performance",
  "Shared concern with resource lifecycle management",
  "Both address concurrency safety mechanisms",
  "Connected through kernel-space implementation details",
  "Both optimize for cache locality patterns",
  "Shared dependency on atomic operations",
  "Both relate to virtual address translation",
  "Connected through process isolation mechanisms",
  "Both address data structure traversal efficiency",
  "Shared concern with system call overhead reduction",
  "Both relate to compiler optimization passes",
  "Connected through CPU pipeline behavior",
  "Both address synchronization primitives",
  "Shared dependency on page table mechanics",
  "Both optimize for reduced context switching",
  "Connected through network stack performance",
  "Both relate to memory reclamation strategies",
  "Shared concern with type safety enforcement",
];

// Generate mock edges — connect thoughts that share strong tag affinities
function generateMockEdges() {
  const edges = [];
  const rng = mulberry32(67890);
  const now = Date.now();
  const DAY = 86400000;

  for (let i = 0; i < THOUGHTS.length; i++) {
    // Each thought connects to 1-4 similar thoughts
    const numEdges = 1 + Math.floor(rng() * 3);
    for (let e = 0; e < numEdges; e++) {
      // Pick a target — prefer nearby thoughts (simulating affinity clustering)
      let target;
      if (rng() < 0.6) {
        // Nearby in ID space (often similar affinities due to generation)
        const offset = 1 + Math.floor(rng() * 15);
        target = (i + offset) % THOUGHTS.length;
      } else {
        // Random long-range connection
        target = Math.floor(rng() * THOUGHTS.length);
      }
      if (target === i) continue;

      // Compute affinity overlap to set weight
      const a = THOUGHTS[i].affinities;
      const b = THOUGHTS[target].affinities;
      let dot = 0, magA = 0, magB = 0;
      for (let d = 0; d < a.length; d++) {
        dot += a[d] * b[d];
        magA += a[d] * a[d];
        magB += b[d] * b[d];
      }
      const cosine = dot / (Math.sqrt(magA) * Math.sqrt(magB) + 1e-8);
      const weight = 0.1 + cosine * 0.8; // map [0,1] cosine to [0.1, 0.9] weight

      if (weight < 0.3) continue; // threshold: skip weak connections

      edges.push({
        source_id: THOUGHTS[i].id,
        target_id: THOUGHTS[target].id,
        weight: weight,
        reasoning: EDGE_REASONINGS[Math.floor(rng() * EDGE_REASONINGS.length)],
        created_at: Math.min(THOUGHTS[i].created_at, THOUGHTS[target].created_at)
          + Math.floor(rng() * DAY * 5),
      });
    }
  }

  // Deduplicate: keep strongest edge per pair
  const seen = new Map();
  for (const edge of edges) {
    const key = Math.min(edge.source_id, edge.target_id) + ',' +
                Math.max(edge.source_id, edge.target_id);
    if (!seen.has(key) || seen.get(key).weight < edge.weight) {
      seen.set(key, edge);
    }
  }
  return Array.from(seen.values());
}

const EDGES = generateMockEdges();

// Precompute normalized age for each edge (0 = newest, 1 = oldest)
{
  let minT = Infinity, maxT = -Infinity;
  for (const e of EDGES) {
    if (e.created_at < minT) minT = e.created_at;
    if (e.created_at > maxT) maxT = e.created_at;
  }
  const range = maxT - minT || 1;
  for (const e of EDGES) {
    e.age = 1.0 - (e.created_at - minT) / range; // 0 = newest, 1 = oldest
  }
}

// Build adjacency for quick lookup: thought_id -> [{ target_id, edge_index }]
const adjacency = new Map();
EDGES.forEach((edge, ei) => {
  if (!adjacency.has(edge.source_id)) adjacency.set(edge.source_id, []);
  if (!adjacency.has(edge.target_id)) adjacency.set(edge.target_id, []);
  adjacency.get(edge.source_id).push({ target: edge.target_id, edgeIdx: ei });
  adjacency.get(edge.target_id).push({ target: edge.source_id, edgeIdx: ei });
});

STORE.thought_count = THOUGHTS.length;
STORE.edge_count = EDGES.length;

// ============================================================
// WEBGL RENDERER
// ============================================================

const canvas = document.getElementById('c');
const gl = canvas.getContext('webgl', { antialias: true, alpha: false });

if (!gl) {
  document.body.innerHTML = '<p style="padding:40px">WebGL not available</p>';
  throw new Error('No WebGL');
}

// --- Resize ---
function resize() {
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = window.innerHeight * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = window.innerHeight + 'px';
  gl.viewport(0, 0, canvas.width, canvas.height);
}

resize();
window.addEventListener('resize', resize);

// --- Shaders ---
const VS_POINTS = `
  attribute vec3 aPos;
  attribute vec4 aColor;
  attribute float aSize;
  uniform mat4 uMVP;
  uniform float uScale;
  uniform vec3 uEye;
  uniform float uFocusDist;
  varying vec4 vColor;
  void main() {
    gl_Position = uMVP * vec4(aPos, 1.0);
    gl_PointSize = aSize * uScale / gl_Position.w;

    // Depth-based dimming: dot product of point direction with eye direction
    // Points facing the camera are bright, back-facing ones dim down
    vec3 toEye = normalize(uEye);
    vec3 pointDir = normalize(aPos);
    float facing = dot(pointDir, toEye);
    // Remap from [-1,1] to [0.08, 1.0] — back-facing nearly invisible
    float dim = smoothstep(-1.0, 0.6, facing) * 0.92 + 0.08;

    // Alpha-based depth of field: fade objects away from focal plane
    float dist = length(aPos - uEye);
    float dofDelta = abs(dist - uFocusDist);
    // Smooth falloff: objects within ~1.5 units of focus are sharp, fading beyond
    float dofFade = 1.0 - smoothstep(0.0, 3.5, dofDelta);
    dofFade = max(dofFade, 0.12); // never fully invisible

    vColor = vec4(aColor.rgb * dim, aColor.a * dim * dofFade);
  }
`;

const FS_POINTS = `
  precision mediump float;
  varying vec4 vColor;
  void main() {
    vec2 c = gl_PointCoord - 0.5;
    float r = dot(c, c);
    if (r > 0.25) discard;
    gl_FragColor = vColor;
  }
`;

// Soft glow shader for bloom halos
const FS_GLOW = `
  precision mediump float;
  varying vec4 vColor;
  void main() {
    vec2 c = gl_PointCoord - 0.5;
    float r = dot(c, c);
    if (r > 0.25) discard;
    // Tight radial falloff for subtle glow
    float glow = 1.0 - smoothstep(0.0, 0.2, r);
    glow = glow * glow * glow; // steep cubic falloff
    gl_FragColor = vec4(vColor.rgb, vColor.a * glow * 0.15);
  }
`;

const VS_LINES = `
  attribute vec3 aPos;
  attribute vec4 aColor;
  uniform mat4 uMVP;
  uniform vec3 uEye;
  uniform float uFocusDist;
  varying vec4 vColor;
  void main() {
    gl_Position = uMVP * vec4(aPos, 1.0);

    // Depth dimming matching the point shader
    vec3 toEye = normalize(uEye);
    float pLen = length(aPos);
    vec3 pointDir = pLen > 0.0 ? aPos / pLen : vec3(0.0);
    float facing = dot(pointDir, toEye);
    float dim = smoothstep(-1.0, 0.6, facing) * 0.92 + 0.08;

    // Alpha-based depth of field
    float dist = length(aPos - uEye);
    float dofDelta = abs(dist - uFocusDist);
    float dofFade = 1.0 - smoothstep(0.0, 3.5, dofDelta);
    dofFade = max(dofFade, 0.12);

    vColor = vec4(aColor.rgb * dim, aColor.a * dim * dofFade);
  }
`;

const FS_LINES = `
  precision mediump float;
  varying vec4 vColor;
  void main() {
    gl_FragColor = vColor;
  }
`;

function compileShader(src, type) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)) {
    console.error(gl.getShaderInfoLog(s));
    return null;
  }
  return s;
}

function linkProgram(vs, fs) {
  const p = gl.createProgram();
  gl.attachShader(p, compileShader(vs, gl.VERTEX_SHADER));
  gl.attachShader(p, compileShader(fs, gl.FRAGMENT_SHADER));
  gl.linkProgram(p);
  if (!gl.getProgramParameter(p, gl.LINK_STATUS)) {
    console.error(gl.getProgramInfoLog(p));
    return null;
  }
  return p;
}

const pointProg = linkProgram(VS_POINTS, FS_POINTS);
const glowProg = linkProgram(VS_POINTS, FS_GLOW);
const lineProg = linkProgram(VS_LINES, FS_LINES);

const uMVP_points = gl.getUniformLocation(pointProg, 'uMVP');
const uScale_points = gl.getUniformLocation(pointProg, 'uScale');
const uEye_points = gl.getUniformLocation(pointProg, 'uEye');
const uFocusDist_points = gl.getUniformLocation(pointProg, 'uFocusDist');
const aPos_points = gl.getAttribLocation(pointProg, 'aPos');
const aColor_points = gl.getAttribLocation(pointProg, 'aColor');
const aSize_points = gl.getAttribLocation(pointProg, 'aSize');

const uMVP_glow = gl.getUniformLocation(glowProg, 'uMVP');
const uScale_glow = gl.getUniformLocation(glowProg, 'uScale');
const uEye_glow = gl.getUniformLocation(glowProg, 'uEye');
const uFocusDist_glow = gl.getUniformLocation(glowProg, 'uFocusDist');
const aPos_glow = gl.getAttribLocation(glowProg, 'aPos');
const aColor_glow = gl.getAttribLocation(glowProg, 'aColor');
const aSize_glow = gl.getAttribLocation(glowProg, 'aSize');

const uMVP_lines = gl.getUniformLocation(lineProg, 'uMVP');
const uEye_lines = gl.getUniformLocation(lineProg, 'uEye');
const uFocusDist_lines = gl.getUniformLocation(lineProg, 'uFocusDist');
const aPos_lines = gl.getAttribLocation(lineProg, 'aPos');
const aColor_lines = gl.getAttribLocation(lineProg, 'aColor');

// ============================================================
// GEOMETRY: FIBONACCI SPHERE
// ============================================================

const SPHERE_RADIUS = 2.0;
const GOLDEN_RATIO = (1 + Math.sqrt(5)) / 2;

// Generate Fibonacci sphere points for tags
function fibonacciSphere(n, radius) {
  const points = [];
  for (let i = 0; i < n; i++) {
    // Fibonacci lattice on sphere
    const theta = 2 * Math.PI * i / GOLDEN_RATIO;
    const phi = Math.acos(1 - 2 * (i + 0.5) / n);
    points.push({
      x: radius * Math.sin(phi) * Math.cos(theta),
      y: radius * Math.sin(phi) * Math.sin(theta),
      z: radius * Math.cos(phi),
    });
  }
  return points;
}

// Tag positions on sphere surface
const tagPositions = fibonacciSphere(TAGS.length, SPHERE_RADIUS);

// Project thoughts into the sphere interior
// Each thought's position = weighted sum of tag positions, scaled by affinities
// Then normalized to sit inside the sphere (radius < SPHERE_RADIUS)
function projectThought(thought) {
  let x = 0, y = 0, z = 0, wsum = 0;
  for (let t = 0; t < TAGS.length; t++) {
    const w = thought.affinities[t];
    x += tagPositions[t].x * w;
    y += tagPositions[t].y * w;
    z += tagPositions[t].z * w;
    wsum += w;
  }
  if (wsum > 0) { x /= wsum; y /= wsum; z /= wsum; }

  // Scale to interior — spread out based on how "specialized" the thought is
  // (high max affinity = closer to surface, low = closer to center)
  const maxAff = Math.max(...thought.affinities);
  const spread = 0.3 + maxAff * 0.65; // 0.3..0.95 of sphere radius
  const len = Math.sqrt(x*x + y*y + z*z) || 1;
  const r = SPHERE_RADIUS * spread;
  return { x: x/len * r, y: y/len * r, z: z/len * r };
}

const thoughtPositions = THOUGHTS.map(projectThought);

// ============================================================
// BEZIER STEMS WITH INERTIAL PHYSICS (Pusteblume / dandelion)
// ============================================================

// Physics: each node has a rest position and a displaced position that lags
// We simulate by tracking angular velocity and applying an inertial offset

const BEZIER_SEGS = 8; // segments per curve
const totalNodes = TAGS.length + THOUGHTS.length;
// Each curve = BEZIER_SEGS segments = (BEZIER_SEGS+1) points, drawn as LINE_STRIP
// But WebGL LINE_STRIP can't do multiple strips in one call, so we use LINES:
// BEZIER_SEGS segments * 2 verts per segment * 7 floats per vert
const vertsPerCurve = BEZIER_SEGS * 2;
const LINE_STRIDE = 7; // x,y,z, r,g,b,a
const maxLineVerts = totalNodes * vertsPerCurve;
const lineData = new Float32Array(maxLineVerts * LINE_STRIDE);

const lineBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, lineBuf);
gl.bufferData(gl.ARRAY_BUFFER, lineData.byteLength, gl.DYNAMIC_DRAW);

// Collect all rest positions: tags first, then thoughts
const restPositions = [];
for (let i = 0; i < TAGS.length; i++) {
  const p = tagPositions[i];
  restPositions.push({ x: p.x, y: p.y, z: p.z, isTag: true });
}
for (let i = 0; i < THOUGHTS.length; i++) {
  const p = thoughtPositions[i];
  restPositions.push({ x: p.x, y: p.y, z: p.z, isTag: false });
}

// Each node gets a displaced position that will lag behind
const displaced = restPositions.map(p => ({ x: p.x, y: p.y, z: p.z }));

// Physics state — angular velocity from camera rotation
let angVelY = 0;
let angVelX = 0;
let prevQuat = null; // set on first frame
let lastTime = 0;

// Stiffness per node — tags (surface, longer stems) are more springy,
// thoughts (interior, shorter) are stiffer
const STIFFNESS_TAG = 2.6;
const STIFFNESS_THOUGHT = 4.4;
const DAMPING = 0.93;
const INERTIA_STRENGTH = 2.6;

// Cubic Bezier evaluation
function bezier3(a, b, c, d, t) {
  const u = 1 - t;
  return u*u*u*a + 3*u*u*t*b + 3*u*t*t*c + t*t*t*d;
}

function buildBezierLines(eyeX, eyeY, eyeZ, breatheFactor) {
  const bf = breatheFactor || 1.0;
  let vi = 0;

  for (let n = 0; n < totalNodes; n++) {
    const rest = restPositions[n];
    const disp = displaced[n];
    const isTag = rest.isTag;

    // P0 = origin
    const p0x = 0, p0y = 0, p0z = 0;
    // P3 = displaced tip (with breathing)
    const p3x = disp.x * bf, p3y = disp.y * bf, p3z = disp.z * bf;

    // Control points create the stiff-chain curve
    // CP1: ~30% along the rest direction (stiff near root)
    const cp1x = rest.x * 0.3 * bf;
    const cp1y = rest.y * 0.3 * bf;
    const cp1z = rest.z * 0.3 * bf;
    // CP2: ~70% toward displaced tip (flexible near tip)
    const cp2x = disp.x * 0.7 * bf;
    const cp2y = disp.y * 0.7 * bf;
    const cp2z = disp.z * 0.7 * bf;

    // Alpha: tags brighter, thoughts subtler; hovered stem gets a strong boost
    const isHovered = (n === hoveredNodeIndex);
    // Exponential taper: near-zero at root, ramps up toward tip
    const alphaBaseRoot = isHovered ? 0.15 : (isTag ? 0.04 : 0.02);
    const alphaBaseTip = isHovered ? 0.9 : (isTag ? 0.40 : 0.20);
    // Hovered stem gets a warm highlight color
    const lineR = isHovered ? 0.6 : 1.0;
    const lineG = isHovered ? 0.8 : 1.0;
    const lineB = isHovered ? 1.0 : 1.0;

    for (let s = 0; s < BEZIER_SEGS; s++) {
      const t0 = s / BEZIER_SEGS;
      const t1 = (s + 1) / BEZIER_SEGS;

      const x0 = bezier3(p0x, cp1x, cp2x, p3x, t0);
      const y0 = bezier3(p0y, cp1y, cp2y, p3y, t0);
      const z0 = bezier3(p0z, cp1z, cp2z, p3z, t0);
      const x1 = bezier3(p0x, cp1x, cp2x, p3x, t1);
      const y1 = bezier3(p0y, cp1y, cp2y, p3y, t1);
      const z1 = bezier3(p0z, cp1z, cp2z, p3z, t1);

      // Exponential alpha taper: t^2 gives steeper ramp near tip
      const a0 = alphaBaseRoot + (alphaBaseTip - alphaBaseRoot) * t0 * t0;
      const a1 = alphaBaseRoot + (alphaBaseTip - alphaBaseRoot) * t1 * t1;

      // Vertex 0 of segment
      lineData[vi++] = x0; lineData[vi++] = y0; lineData[vi++] = z0;
      lineData[vi++] = lineR; lineData[vi++] = lineG; lineData[vi++] = lineB;
      lineData[vi++] = a0;
      // Vertex 1 of segment
      lineData[vi++] = x1; lineData[vi++] = y1; lineData[vi++] = z1;
      lineData[vi++] = lineR; lineData[vi++] = lineG; lineData[vi++] = lineB;
      lineData[vi++] = a1;
    }
  }

  return vi / LINE_STRIDE; // total vertices
}

function updatePhysics(dt) {
  // First frame: initialize prevQuat, no delta
  if (!prevQuat) {
    prevQuat = camQuat.slice();
    return;
  }

  // Derive angular velocity from quaternion delta
  // delta = camQuat * conjugate(prevQuat) gives the incremental rotation
  const pConj = [-prevQuat[0], -prevQuat[1], -prevQuat[2], prevQuat[3]];
  const dq = quatMul(camQuat, pConj);
  prevQuat = camQuat.slice();

  // Extract approximate angular velocity vector (world-space)
  // For small rotations: axis * angle ≈ 2 * [x, y, z] of the delta quat
  const dAngX = 2 * dq[0];
  const dAngY = 2 * dq[1];
  const dAngZ = 2 * dq[2];

  // Accumulate angular velocity with inertia
  angVelX += dAngX * INERTIA_STRENGTH;
  angVelY += dAngY * INERTIA_STRENGTH;
  let angVelZ_inst = dAngZ * INERTIA_STRENGTH;

  // Damp
  angVelX *= DAMPING;
  angVelY *= DAMPING;

  // Full angular velocity vector in world space
  const wX = angVelX;
  const wY = angVelY;
  const wZ = angVelZ_inst;

  // Apply displacement: each node's tip lags behind the rotation
  // Proper cross product: offset = omega × position (tangential lag)
  for (let n = 0; n < totalNodes; n++) {
    const rest = restPositions[n];
    const dist = Math.sqrt(rest.x * rest.x + rest.y * rest.y + rest.z * rest.z);
    const stiffness = rest.isTag ? STIFFNESS_TAG : STIFFNESS_THOUGHT;

    // cross(omega, rest) gives the tangential displacement direction
    const crossX = wY * rest.z - wZ * rest.y;
    const crossY = wZ * rest.x - wX * rest.z;
    const crossZ = wX * rest.y - wY * rest.x;

    // Scale by remaining room to sphere surface: nodes on the surface can't expand,
    // interior nodes sway proportionally to their distance from the surface
    const headroom = Math.max(0, SPHERE_RADIUS - dist);
    const scale = headroom * 0.525;
    const offsetX = -crossX * scale;
    const offsetY = -crossY * scale;
    const offsetZ = -crossZ * scale;

    // Spring back toward rest position
    const targetX = rest.x + offsetX;
    const targetY = rest.y + offsetY;
    const targetZ = rest.z + offsetZ;

    const springDt = Math.min(dt * stiffness, 0.95);
    displaced[n].x += (targetX - displaced[n].x) * springDt;
    displaced[n].y += (targetY - displaced[n].y) * springDt;
    displaced[n].z += (targetZ - displaced[n].z) * springDt;

    // Clamp displaced position to sphere surface
    const dx = displaced[n].x, dy = displaced[n].y, dz = displaced[n].z;
    const dispDist = Math.sqrt(dx * dx + dy * dy + dz * dz);
    if (dispDist > SPHERE_RADIUS) {
      const clampScale = SPHERE_RADIUS / dispDist;
      displaced[n].x *= clampScale;
      displaced[n].y *= clampScale;
      displaced[n].z *= clampScale;
    }
  }
}

// ============================================================
// INTER-THOUGHT EDGE GEOMETRY (curved arcs between connected nodes)
// ============================================================

const EDGE_SEGS = 6; // segments per inter-thought arc
const edgeVertsPerArc = EDGE_SEGS * 2;
const maxEdgeLineVerts = EDGES.length * edgeVertsPerArc;
const edgeLineData = new Float32Array(maxEdgeLineVerts * LINE_STRIDE);

const edgeLineBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, edgeLineBuf);
gl.bufferData(gl.ARRAY_BUFFER, edgeLineData.byteLength, gl.DYNAMIC_DRAW);

// Map thought id -> index in displaced[] array (thoughts start at TAGS.length)
const thoughtIdToDisplacedIdx = new Map();
for (let i = 0; i < THOUGHTS.length; i++) {
  thoughtIdToDisplacedIdx.set(THOUGHTS[i].id, TAGS.length + i);
}

function buildEdgeLines(eyeX, eyeY, eyeZ, breatheFactor) {
  const bf = breatheFactor || 1.0;
  let vi = 0;

  for (let e = 0; e < EDGES.length; e++) {
    const edge = EDGES[e];
    const srcIdx = thoughtIdToDisplacedIdx.get(edge.source_id);
    const tgtIdx = thoughtIdToDisplacedIdx.get(edge.target_id);
    if (srcIdx === undefined || tgtIdx === undefined) continue;

    const src = displaced[srcIdx];
    const tgt = displaced[tgtIdx];

    // Endpoints with breathing
    const p0x = src.x * bf, p0y = src.y * bf, p0z = src.z * bf;
    const p3x = tgt.x * bf, p3y = tgt.y * bf, p3z = tgt.z * bf;

    // Midpoint
    const mx = (p0x + p3x) * 0.5;
    const my = (p0y + p3y) * 0.5;
    const mz = (p0z + p3z) * 0.5;

    // Bow the curve outward from the origin — the control point is pushed
    // radially outward from the midpoint. This creates a visible arc shape.
    const mLen = Math.sqrt(mx * mx + my * my + mz * mz) || 1;
    // Distance between endpoints determines how much to bow
    const dx = p3x - p0x, dy = p3y - p0y, dz = p3z - p0z;
    const span = Math.sqrt(dx * dx + dy * dy + dz * dz);
    const bow = span * 0.25; // arc height proportional to distance
    const cpx = mx + (mx / mLen) * bow;
    const cpy = my + (my / mLen) * bow;
    const cpz = mz + (mz / mLen) * bow;

    // Edge color: warm amber tint, alpha driven by weight
    // Hovered edges get brighter
    const isHoveredEdge = (srcIdx === hoveredNodeIndex || tgtIdx === hoveredNodeIndex);
    const baseAlpha = edge.weight * (isHoveredEdge ? 0.6 : 0.18);
    const r = isHoveredEdge ? 1.0 : 0.9;
    const g = isHoveredEdge ? 0.85 : 0.65;
    const b = isHoveredEdge ? 0.5 : 0.3;

    for (let s = 0; s < EDGE_SEGS; s++) {
      const t0 = s / EDGE_SEGS;
      const t1 = (s + 1) / EDGE_SEGS;

      // Quadratic bezier: P = (1-t)^2*P0 + 2(1-t)t*CP + t^2*P3
      const u0 = 1 - t0, u1 = 1 - t1;
      const x0 = u0*u0*p0x + 2*u0*t0*cpx + t0*t0*p3x;
      const y0 = u0*u0*p0y + 2*u0*t0*cpy + t0*t0*p3y;
      const z0 = u0*u0*p0z + 2*u0*t0*cpz + t0*t0*p3z;
      const x1 = u1*u1*p0x + 2*u1*t1*cpx + t1*t1*p3x;
      const y1 = u1*u1*p0y + 2*u1*t1*cpy + t1*t1*p3y;
      const z1 = u1*u1*p0z + 2*u1*t1*cpz + t1*t1*p3z;

      // Alpha tapers from center outward: peak at midpoint, fade at endpoints
      const mid0 = 1.0 - Math.abs(t0 - 0.5) * 2.0; // 0 at ends, 1 at middle
      const mid1 = 1.0 - Math.abs(t1 - 0.5) * 2.0;
      const a0 = baseAlpha * (0.3 + 0.7 * mid0);
      const a1 = baseAlpha * (0.3 + 0.7 * mid1);

      edgeLineData[vi++] = x0; edgeLineData[vi++] = y0; edgeLineData[vi++] = z0;
      edgeLineData[vi++] = r; edgeLineData[vi++] = g; edgeLineData[vi++] = b;
      edgeLineData[vi++] = a0;
      edgeLineData[vi++] = x1; edgeLineData[vi++] = y1; edgeLineData[vi++] = z1;
      edgeLineData[vi++] = r; edgeLineData[vi++] = g; edgeLineData[vi++] = b;
      edgeLineData[vi++] = a1;
    }
  }

  return vi / LINE_STRIDE;
}

// ============================================================
// POINT BUFFERS
// ============================================================

// Build combined point data: [tags on surface] + [thoughts inside]
const STRIDE = 8; // x,y,z, r,g,b,a, size
const totalPoints = TAGS.length + THOUGHTS.length;
const pointData = new Float32Array(totalPoints * STRIDE);
const sortedPointData = new Float32Array(totalPoints * STRIDE);
const sortIndices = new Array(totalPoints);
const sortDepths = new Float32Array(totalPoints);
for (let i = 0; i < totalPoints; i++) sortIndices[i] = i;

let idx = 0;

// --- Tags (surface) ---
for (let i = 0; i < TAGS.length; i++) {
  const p = tagPositions[i];
  pointData[idx++] = p.x;
  pointData[idx++] = p.y;
  pointData[idx++] = p.z;
  // Unified gradient: tags sit at old/teal end
  const spread = i / TAGS.length;
  const ageFactor = 0.05 + spread * 0.15;
  pointData[idx++] = 0.27 + ageFactor * 0.59;
  pointData[idx++] = 0.53 - ageFactor * 0.13;
  pointData[idx++] = 0.53 - ageFactor * 0.26;
  pointData[idx++] = 1.0;
  pointData[idx++] = 0.9; // size
}

// --- Thoughts (interior) ---
for (let i = 0; i < THOUGHTS.length; i++) {
  const p = thoughtPositions[i];
  const t = THOUGHTS[i];
  pointData[idx++] = p.x;
  pointData[idx++] = p.y;
  pointData[idx++] = p.z;
  // Unified gradient: old = teal, new = coral, modulated by brightness
  const brightness = 0.5 + 0.5 * Math.min(t.access_count / 30, 1);
  const ageFactor2 = 1.0 - t.age;
  pointData[idx++] = (0.27 + ageFactor2 * 0.59) * brightness;
  pointData[idx++] = (0.53 - ageFactor2 * 0.13) * brightness;
  pointData[idx++] = (0.53 - ageFactor2 * 0.26) * brightness;
  pointData[idx++] = 1.0;
  pointData[idx++] = 0.25 + 0.2 * (t.access_count / 50); // size by access
}

const pointBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, pointBuf);
gl.bufferData(gl.ARRAY_BUFFER, pointData, gl.DYNAMIC_DRAW);

// Glow buffer — only for tag points (larger, softer halos)
const glowData = new Float32Array(TAGS.length * STRIDE);
const glowBuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, glowBuf);
gl.bufferData(gl.ARRAY_BUFFER, glowData.byteLength, gl.DYNAMIC_DRAW);

// ============================================================
// MATRIX & QUATERNION MATH
// ============================================================

function mat4Perspective(fov, aspect, near, far) {
  const f = 1 / Math.tan(fov / 2);
  const nf = 1 / (near - far);
  return new Float32Array([
    f/aspect, 0, 0, 0,
    0, f, 0, 0,
    0, 0, (far+near)*nf, -1,
    0, 0, 2*far*near*nf, 0
  ]);
}

function mat4LookAt(eye, center, up) {
  const zx = eye[0]-center[0], zy = eye[1]-center[1], zz = eye[2]-center[2];
  let len = 1/Math.sqrt(zx*zx+zy*zy+zz*zz);
  const z = [zx*len, zy*len, zz*len];
  const xx = up[1]*z[2]-up[2]*z[1], xy = up[2]*z[0]-up[0]*z[2], xz = up[0]*z[1]-up[1]*z[0];
  len = 1/Math.sqrt(xx*xx+xy*xy+xz*xz);
  const x = [xx*len, xy*len, xz*len];
  const y = [x[1]*z[2]-x[2]*z[1], x[2]*z[0]-x[0]*z[2], x[0]*z[1]-x[1]*z[0]];
  return new Float32Array([
    x[0], y[0], z[0], 0,
    x[1], y[1], z[1], 0,
    x[2], y[2], z[2], 0,
    -(x[0]*eye[0]+x[1]*eye[1]+x[2]*eye[2]),
    -(y[0]*eye[0]+y[1]*eye[1]+y[2]*eye[2]),
    -(z[0]*eye[0]+z[1]*eye[1]+z[2]*eye[2]),
    1
  ]);
}

function mat4Mul(a, b) {
  const r = new Float32Array(16);
  for (let i = 0; i < 4; i++)
    for (let j = 0; j < 4; j++)
      r[j*4+i] = a[i]*b[j*4] + a[4+i]*b[j*4+1] + a[8+i]*b[j*4+2] + a[12+i]*b[j*4+3];
  return r;
}

// Quaternion [x, y, z, w]
function quatMul(a, b) {
  return [
    a[3]*b[0] + a[0]*b[3] + a[1]*b[2] - a[2]*b[1],
    a[3]*b[1] - a[0]*b[2] + a[1]*b[3] + a[2]*b[0],
    a[3]*b[2] + a[0]*b[1] - a[1]*b[0] + a[2]*b[3],
    a[3]*b[3] - a[0]*b[0] - a[1]*b[1] - a[2]*b[2],
  ];
}

function quatNormalize(q) {
  const len = Math.sqrt(q[0]*q[0] + q[1]*q[1] + q[2]*q[2] + q[3]*q[3]) || 1;
  return [q[0]/len, q[1]/len, q[2]/len, q[3]/len];
}

function quatFromAxisAngle(ax, ay, az, angle) {
  const half = angle * 0.5;
  const s = Math.sin(half);
  return [ax * s, ay * s, az * s, Math.cos(half)];
}

// Rotate a vec3 by a quaternion
function quatRotateVec3(q, v) {
  const qx = q[0], qy = q[1], qz = q[2], qw = q[3];
  const vx = v[0], vy = v[1], vz = v[2];
  // t = 2 * cross(q.xyz, v)
  const tx = 2 * (qy * vz - qz * vy);
  const ty = 2 * (qz * vx - qx * vz);
  const tz = 2 * (qx * vy - qy * vx);
  return [
    vx + qw * tx + (qy * tz - qz * ty),
    vy + qw * ty + (qz * tx - qx * tz),
    vz + qw * tz + (qx * ty - qy * tx),
  ];
}

// Get the local right and up axes from the camera quaternion
function quatToAxes(q) {
  const right = quatRotateVec3(q, [1, 0, 0]);
  const up = quatRotateVec3(q, [0, 1, 0]);
  return { right, up };
}

// ============================================================
// CAMERA (quaternion orbit)
// ============================================================

let camDist = 6.0;
let camDistTarget = 6.0; // smooth zoom target
// Initialize quaternion from the original euler angles (pitch=0.3, yaw=0)
// Rotation: first yaw around Y, then pitch around X
let camQuat = quatNormalize(quatFromAxisAngle(1, 0, 0, 0.3));
let autoRotate = true;

// --- Mouse / touch controls ---
let dragging = false;
let lastMX = 0, lastMY = 0;

canvas.addEventListener('mousedown', e => {
  dragging = true;
  lastMX = e.clientX;
  lastMY = e.clientY;
  autoRotate = false;
});
window.addEventListener('mouseup', () => { dragging = false; });
window.addEventListener('mousemove', e => {
  if (dragging) {
    const dx = -(e.clientX - lastMX) * 0.005;
    const dy = (e.clientY - lastMY) * 0.005;

    // Rotate around world Y for horizontal drag (yaw)
    const qYaw = quatFromAxisAngle(0, 1, 0, dx);
    // Rotate around camera-local X for vertical drag (pitch)
    const { right } = quatToAxes(camQuat);
    const qPitch = quatFromAxisAngle(right[0], right[1], right[2], dy);

    camQuat = quatNormalize(quatMul(qPitch, quatMul(qYaw, camQuat)));
    lastMX = e.clientX;
    lastMY = e.clientY;
  }
  mouseX = e.clientX;
  mouseY = e.clientY;
});

canvas.addEventListener('wheel', e => {
  camDistTarget *= 1 + e.deltaY * 0.001;
  camDistTarget = Math.max(2.5, Math.min(20, camDistTarget));
  e.preventDefault();
}, { passive: false });

// Double click to re-enable auto-rotation
canvas.addEventListener('dblclick', () => { autoRotate = true; });

// ============================================================
// HOVER / TOOLTIP
// ============================================================

let mouseX = 0, mouseY = 0;
let hoveredNodeIndex = -1; // index into restPositions (-1 = none)
// Smooth hover animation: per-node blend factor 0..1
const hoverAnim = new Float32Array(totalNodes); // all start at 0
const tooltip = document.getElementById('tooltip');
const tooltipLabel = tooltip.querySelector('.label');
const tooltipDetail = tooltip.querySelector('.detail');
const tooltipSource = tooltip.querySelector('.source');
const tooltipConnections = tooltip.querySelector('.connections');

function project3Dto2D(x, y, z, mvp, w, h) {
  const cx = mvp[0]*x + mvp[4]*y + mvp[8]*z + mvp[12];
  const cy = mvp[1]*x + mvp[5]*y + mvp[9]*z + mvp[13];
  const cw = mvp[3]*x + mvp[7]*y + mvp[11]*z + mvp[15];
  if (cw <= 0) return null;
  return {
    x: (cx/cw * 0.5 + 0.5) * w,
    y: (1 - (cy/cw * 0.5 + 0.5)) * h,
    depth: cw,
  };
}

function updateTooltip(mvp, eyeX, eyeY, eyeZ) {
  const W = window.innerWidth;
  const H = window.innerHeight;
  let bestScore = Infinity;
  let bestItem = null;

  // Depth-weighted selection: score = pixelDist * depthPenalty
  // Closer points get a much lower penalty, so they're strongly preferred
  function score(screenDist, px, py, pz) {
    const dx = px - eyeX, dy = py - eyeY, dz = pz - eyeZ;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz);
    // Normalize depth: 0 = closest possible, 1 = farthest
    // camDist +/- SPHERE_RADIUS is the practical range
    const depthFactor = (dist - (camDist - SPHERE_RADIUS)) / (2 * SPHERE_RADIUS);
    const clamped = Math.max(0, Math.min(1, depthFactor));
    // Quadratic depth penalty: back-facing items need to be 4x closer in pixels
    const penalty = 1 + clamped * clamped * 15;
    return screenDist * penalty;
  }

  // Check tags
  for (let i = 0; i < TAGS.length; i++) {
    const p = displaced[i];
    const s = project3Dto2D(p.x, p.y, p.z, mvp, W, H);
    if (!s) continue;
    const d = Math.sqrt((s.x - mouseX)**2 + (s.y - mouseY)**2);
    if (d > 40) continue; // broad pixel cull
    const sc = score(d, p.x, p.y, p.z);
    if (sc < bestScore) {
      bestScore = sc;
      bestItem = { type: 'tag', index: i, screen: s };
    }
  }

  // Check thoughts
  for (let i = 0; i < THOUGHTS.length; i++) {
    const p = displaced[TAGS.length + i];
    const s = project3Dto2D(p.x, p.y, p.z, mvp, W, H);
    if (!s) continue;
    const d = Math.sqrt((s.x - mouseX)**2 + (s.y - mouseY)**2);
    if (d > 40) continue;
    const sc = score(d, p.x, p.y, p.z);
    if (sc < bestScore) {
      bestScore = sc;
      bestItem = { type: 'thought', index: i, screen: s };
    }
  }

  if (bestItem) {
    tooltip.style.opacity = '1';
    tooltip.style.left = (bestItem.screen.x + 12) + 'px';
    tooltip.style.top = (bestItem.screen.y - 8) + 'px';

    if (bestItem.type === 'tag') {
      hoveredNodeIndex = bestItem.index;
      const tag = TAGS[bestItem.index];
      tooltipLabel.textContent = tag.label;
      tooltipDetail.textContent = `dim ${tag.dim_index} · surface vector`;
      tooltipSource.textContent = '';
      tooltipConnections.innerHTML = '';
    } else {
      hoveredNodeIndex = TAGS.length + bestItem.index;
      const t = THOUGHTS[bestItem.index];
      const topTag = TAGS[t.affinities.indexOf(Math.max(...t.affinities))];

      // Recency display
      const daysAgo = Math.floor((Date.now() - t.created_at) / 86400000);
      const recencyStr = daysAgo === 0 ? 'today' : daysAgo === 1 ? '1 day ago' : `${daysAgo}d ago`;

      tooltipLabel.textContent = t.text;
      tooltipDetail.textContent = `access: ${t.access_count} · primary: ${topTag.label} · ${recencyStr}`;
      tooltipSource.textContent = `source: ${t.source_id}`;

      // Show connected edges with reasoning
      const neighbors = adjacency.get(t.id) || [];
      if (neighbors.length > 0) {
        const maxShow = 3;
        let html = `<div style="color:#8a7a60">${neighbors.length} connection${neighbors.length > 1 ? 's' : ''}:</div>`;
        for (let c = 0; c < Math.min(neighbors.length, maxShow); c++) {
          const edge = EDGES[neighbors[c].edgeIdx];
          const targetThought = THOUGHTS.find(th => th.id === neighbors[c].target);
          const targetName = targetThought ? targetThought.text : `thought-${neighbors[c].target}`;
          const w = (edge.weight * 100).toFixed(0);
          // Truncate reasoning and target name for tooltip
          const reason = edge.reasoning.length > 50 ? edge.reasoning.slice(0, 47) + '...' : edge.reasoning;
          const name = targetName.length > 35 ? targetName.slice(0, 32) + '...' : targetName;
          html += `<div class="edge-item">→ ${name} <span style="color:#6a8a6a">(${w}%)</span></div>`;
          html += `<div style="color:#706858;font-style:italic;margin-left:10px">${reason}</div>`;
        }
        if (neighbors.length > maxShow) {
          html += `<div style="color:#606060">+${neighbors.length - maxShow} more</div>`;
        }
        tooltipConnections.innerHTML = html;
      } else {
        tooltipConnections.innerHTML = '';
      }
    }
  } else {
    hoveredNodeIndex = -1;
    tooltip.style.opacity = '0';
  }
}

// ============================================================
// LABEL RENDERING (HTML overlay for tag labels)
// ============================================================

const labelContainer = document.createElement('div');
labelContainer.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;';
document.body.appendChild(labelContainer);

const labelEls = TAGS.map((tag, i) => {
  const el = document.createElement('div');
  el.style.cssText = `
    position: absolute;
    font-size: 9px;
    color: rgba(160, 195, 255, 0.9);
    white-space: nowrap;
    transform: translate(-50%, -50%);
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(8, 10, 22, 0.55);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(100, 150, 255, 0.12);
    box-shadow: 0 0 8px rgba(60, 100, 200, 0.08), inset 0 0 6px rgba(80, 120, 255, 0.04);
    letter-spacing: 0.3px;
  `;
  el.textContent = tag.label;
  labelContainer.appendChild(el);
  return el;
});

function updateLabels(mvp, eyeX, eyeY, eyeZ) {
  const W = window.innerWidth;
  const H = window.innerHeight;
  const eLen = Math.sqrt(eyeX*eyeX + eyeY*eyeY + eyeZ*eyeZ) || 1;
  const ex = eyeX/eLen, ey = eyeY/eLen, ez = eyeZ/eLen;
  for (let i = 0; i < TAGS.length; i++) {
    const p = displaced[i]; // follow displaced position
    const s = project3Dto2D(p.x, p.y, p.z, mvp, W, H);
    const el = labelEls[i];
    if (s && s.x > -50 && s.x < W + 50 && s.y > -50 && s.y < H + 50) {
      el.style.display = 'block';
      el.style.left = s.x + 'px';
      el.style.top = (s.y - 14) + 'px';
      const pLen = Math.sqrt(p.x*p.x + p.y*p.y + p.z*p.z) || 1;
      const facing = (p.x*ex + p.y*ey + p.z*ez) / pLen;
      const fade = Math.max(0, Math.min(1, (facing + 1) / 1.6)) * 0.92 + 0.08;
      el.style.opacity = fade.toString();
    } else {
      el.style.display = 'none';
    }
  }
}

// ============================================================
// UI
// ============================================================

document.getElementById('store-name').textContent = STORE.name;
document.getElementById('store-purpose').textContent = STORE.purpose;
document.getElementById('store-stats').textContent =
  `${STORE.thought_count} thoughts · ${STORE.edge_count} edges · ${TAGS.length} tags`;

// ============================================================
// RENDER LOOP
// ============================================================

gl.enable(gl.BLEND);
gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
gl.enable(gl.DEPTH_TEST);
gl.depthFunc(gl.LEQUAL);

const BPF = 4; // bytes per float
const STRIDE_BYTES = STRIDE * BPF;
const LINE_STRIDE_BYTES = LINE_STRIDE * BPF;

function render(time) {
  requestAnimationFrame(render);

  const t = time * 0.001;
  const dt = lastTime > 0 ? Math.min(t - lastTime, 0.05) : 0.016;
  lastTime = t;

  if (autoRotate) {
    // Gentle rotation around world Y axis
    const qSpin = quatFromAxisAngle(0, 1, 0, dt * 0.1);
    camQuat = quatNormalize(quatMul(qSpin, camQuat));
  }

  // Breathing animation — subtle scale pulse
  const breathe = 1.0 + Math.sin(t * 0.8) * 0.012; // 1.2% amplitude, slow cycle

  // Smooth zoom easing
  camDist += (camDistTarget - camDist) * Math.min(dt * 8, 0.9);

  // Update physics after camera rotation is set
  updatePhysics(dt);

  // Camera eye = quaternion applied to (0, 0, camDist)
  const eyePos = quatRotateVec3(camQuat, [0, 0, camDist]);
  const eyeX = eyePos[0], eyeY = eyePos[1], eyeZ = eyePos[2];
  // Up vector from quaternion
  const upVec = quatRotateVec3(camQuat, [0, 1, 0]);

  const aspect = canvas.width / canvas.height;
  const proj = mat4Perspective(Math.PI / 4, aspect, 0.1, 50);
  const view = mat4LookAt([eyeX, eyeY, eyeZ], [0, 0, 0], upVec);
  const mvp = mat4Mul(proj, view);

  gl.clearColor(0.039, 0.039, 0.059, 1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);

  // --- Update point positions to match displaced tips, and animate hover ---
  const hoverLerpSpeed = Math.min(dt * 10, 0.9); // smooth ease ~10Hz
  for (let i = 0; i < totalNodes; i++) {
    const off = i * STRIDE;
    pointData[off]     = displaced[i].x * breathe;
    pointData[off + 1] = displaced[i].y * breathe;
    pointData[off + 2] = displaced[i].z * breathe;

    // Animate hover factor toward target
    const target = (i === hoveredNodeIndex) ? 1.0 : 0.0;
    hoverAnim[i] += (target - hoverAnim[i]) * hoverLerpSpeed;
    const h = hoverAnim[i];

    // Compute base values
    // Unified color gradient: old = teal (#448888), new = coral (#dd6644)
    // Tags default to the old/teal end; thoughts spread by recency.
    let baseR, baseG, baseB, baseA, baseSize;
    if (i < TAGS.length) {
      // Tags are the roots — sit at the "old" end of the gradient
      // Slight variation so they're not all identical
      const spread = i / TAGS.length; // 0..1 across tags
      const ageFactor = 0.05 + spread * 0.15; // 0.05..0.20 — mostly old
      baseR = 0.27 + ageFactor * 0.59; // teal→coral R: 0.27 .. 0.86
      baseG = 0.53 - ageFactor * 0.13; // teal→coral G: 0.53 .. 0.40
      baseB = 0.53 - ageFactor * 0.26; // teal→coral B: 0.53 .. 0.27
      baseA = 1.0;
      baseSize = 0.9;
    } else {
      const th = THOUGHTS[i - TAGS.length];
      const brightness = 0.5 + 0.5 * Math.min(th.access_count / 30, 1);

      // age: 0 = newest, 1 = oldest
      // Map to gradient: ageFactor 0 = old/teal, 1 = new/coral
      const ageFactor = 1.0 - th.age;
      // Lerp between teal (0.27, 0.53, 0.53) and coral (0.86, 0.40, 0.27)
      baseR = (0.27 + ageFactor * 0.59) * brightness;
      baseG = (0.53 - ageFactor * 0.13) * brightness;
      baseB = (0.53 - ageFactor * 0.26) * brightness;
      baseA = 1.0;
      baseSize = 0.25 + 0.2 * (th.access_count / 50);
    }

    // Blend between base and hover state — hover highlights to bright warm white
    pointData[off + 3] = baseR + (0.95 - baseR) * h;
    pointData[off + 4] = baseG + (0.85 - baseG) * h;
    pointData[off + 5] = baseB + (0.75 - baseB) * h;
    pointData[off + 6] = baseA;
    pointData[off + 7] = baseSize * (1.0 + h * 1.5); // grow to 2.5x at full hover
  }

  // --- Depth-sort points back-to-front for correct alpha blending ---
  for (let i = 0; i < totalPoints; i++) {
    const off = i * STRIDE;
    const px = pointData[off], py = pointData[off + 1], pz = pointData[off + 2];
    const dx = px - eyeX, dy = py - eyeY, dz = pz - eyeZ;
    sortDepths[i] = dx * dx + dy * dy + dz * dz;
    sortIndices[i] = i;
  }
  sortIndices.sort((a, b) => sortDepths[b] - sortDepths[a]);
  for (let i = 0; i < totalPoints; i++) {
    const src = sortIndices[i] * STRIDE;
    const dst = i * STRIDE;
    for (let j = 0; j < STRIDE; j++) sortedPointData[dst + j] = pointData[src + j];
  }

  // --- Dot depth pre-pass: stamp dot circles into depth buffer (no color) ---
  // This creates a mask so lines won't render inside node circles
  gl.colorMask(false, false, false, false);
  gl.depthMask(true);
  gl.enable(gl.DEPTH_TEST);

  gl.useProgram(pointProg);
  gl.uniformMatrix4fv(uMVP_points, false, mvp);
  gl.uniform1f(uScale_points, canvas.height * 0.15);
  gl.uniform3f(uEye_points, eyeX, eyeY, eyeZ);
  gl.uniform1f(uFocusDist_points, camDist);

  gl.bindBuffer(gl.ARRAY_BUFFER, pointBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, sortedPointData);
  gl.enableVertexAttribArray(aPos_points);
  gl.enableVertexAttribArray(aColor_points);
  gl.enableVertexAttribArray(aSize_points);
  gl.vertexAttribPointer(aPos_points, 3, gl.FLOAT, false, STRIDE_BYTES, 0);
  gl.vertexAttribPointer(aColor_points, 4, gl.FLOAT, false, STRIDE_BYTES, 3 * BPF);
  gl.vertexAttribPointer(aSize_points, 1, gl.FLOAT, false, STRIDE_BYTES, 7 * BPF);
  gl.drawArrays(gl.POINTS, 0, totalPoints);
  gl.disableVertexAttribArray(aPos_points);
  gl.disableVertexAttribArray(aColor_points);
  gl.disableVertexAttribArray(aSize_points);

  gl.colorMask(true, true, true, true);

  // --- Build and draw Bezier stems ---
  // Lines depth-test against the dot mask — fragments behind dots are occluded
  const totalLineVerts = buildBezierLines(eyeX, eyeY, eyeZ, breathe);

  gl.useProgram(lineProg);
  gl.uniformMatrix4fv(uMVP_lines, false, mvp);
  gl.uniform3f(uEye_lines, eyeX, eyeY, eyeZ);
  gl.uniform1f(uFocusDist_lines, camDist);
  gl.depthMask(false); // don't let lines write depth — dots own the depth buffer

  gl.bindBuffer(gl.ARRAY_BUFFER, lineBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, lineData);
  gl.enableVertexAttribArray(aPos_lines);
  gl.enableVertexAttribArray(aColor_lines);
  gl.vertexAttribPointer(aPos_lines, 3, gl.FLOAT, false, LINE_STRIDE_BYTES, 0);
  gl.vertexAttribPointer(aColor_lines, 4, gl.FLOAT, false, LINE_STRIDE_BYTES, 3 * BPF);
  gl.drawArrays(gl.LINES, 0, totalLineVerts);
  gl.disableVertexAttribArray(aPos_lines);
  gl.disableVertexAttribArray(aColor_lines);

  // --- Build and draw inter-thought edges (curved arcs) ---
  // Same shader, same depth mask from dots — edges also occluded by node circles
  const totalEdgeVerts = buildEdgeLines(eyeX, eyeY, eyeZ, breathe);
  if (totalEdgeVerts > 0) {
    gl.bindBuffer(gl.ARRAY_BUFFER, edgeLineBuf);
    gl.bufferSubData(gl.ARRAY_BUFFER, 0, edgeLineData);
    gl.enableVertexAttribArray(aPos_lines);
    gl.enableVertexAttribArray(aColor_lines);
    gl.vertexAttribPointer(aPos_lines, 3, gl.FLOAT, false, LINE_STRIDE_BYTES, 0);
    gl.vertexAttribPointer(aColor_lines, 4, gl.FLOAT, false, LINE_STRIDE_BYTES, 3 * BPF);
    gl.drawArrays(gl.LINES, 0, totalEdgeVerts);
    gl.disableVertexAttribArray(aPos_lines);
    gl.disableVertexAttribArray(aColor_lines);
  }

  // --- Draw dots (color pass) — sorted back-to-front for transparency ---
  gl.useProgram(pointProg);
  gl.uniformMatrix4fv(uMVP_points, false, mvp);
  gl.uniform1f(uScale_points, canvas.height * 0.15);
  gl.uniform3f(uEye_points, eyeX, eyeY, eyeZ);
  gl.uniform1f(uFocusDist_points, camDist);

  gl.bindBuffer(gl.ARRAY_BUFFER, pointBuf);
  gl.enableVertexAttribArray(aPos_points);
  gl.enableVertexAttribArray(aColor_points);
  gl.enableVertexAttribArray(aSize_points);
  gl.vertexAttribPointer(aPos_points, 3, gl.FLOAT, false, STRIDE_BYTES, 0);
  gl.vertexAttribPointer(aColor_points, 4, gl.FLOAT, false, STRIDE_BYTES, 3 * BPF);
  gl.vertexAttribPointer(aSize_points, 1, gl.FLOAT, false, STRIDE_BYTES, 7 * BPF);

  gl.disable(gl.DEPTH_TEST);
  gl.drawArrays(gl.POINTS, 0, totalPoints);

  gl.disableVertexAttribArray(aPos_points);
  gl.disableVertexAttribArray(aColor_points);
  gl.disableVertexAttribArray(aSize_points);

  // --- Draw glow halos on tag dots (additive blending) ---
  // Build glow data from tag points with 4x size
  for (let i = 0; i < TAGS.length; i++) {
    const off = i * STRIDE;
    const pOff = i * STRIDE; // tags are first in pointData
    glowData[off]     = pointData[pOff];
    glowData[off + 1] = pointData[pOff + 1];
    glowData[off + 2] = pointData[pOff + 2];
    glowData[off + 3] = pointData[pOff + 3]; // color r
    glowData[off + 4] = pointData[pOff + 4]; // color g
    glowData[off + 5] = pointData[pOff + 5]; // color b
    glowData[off + 6] = pointData[pOff + 6]; // color a
    glowData[off + 7] = pointData[pOff + 7] * 2.5; // 2.5x size for glow halo
  }

  gl.blendFunc(gl.SRC_ALPHA, gl.ONE); // additive blending for glow
  gl.useProgram(glowProg);
  gl.uniformMatrix4fv(uMVP_glow, false, mvp);
  gl.uniform1f(uScale_glow, canvas.height * 0.15);
  gl.uniform3f(uEye_glow, eyeX, eyeY, eyeZ);
  gl.uniform1f(uFocusDist_glow, camDist);

  gl.bindBuffer(gl.ARRAY_BUFFER, glowBuf);
  gl.bufferSubData(gl.ARRAY_BUFFER, 0, glowData);
  gl.enableVertexAttribArray(aPos_glow);
  gl.enableVertexAttribArray(aColor_glow);
  gl.enableVertexAttribArray(aSize_glow);
  gl.vertexAttribPointer(aPos_glow, 3, gl.FLOAT, false, STRIDE_BYTES, 0);
  gl.vertexAttribPointer(aColor_glow, 4, gl.FLOAT, false, STRIDE_BYTES, 3 * BPF);
  gl.vertexAttribPointer(aSize_glow, 1, gl.FLOAT, false, STRIDE_BYTES, 7 * BPF);
  gl.drawArrays(gl.POINTS, 0, TAGS.length);
  gl.disableVertexAttribArray(aPos_glow);
  gl.disableVertexAttribArray(aColor_glow);
  gl.disableVertexAttribArray(aSize_glow);

  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA); // restore normal blending
  gl.depthMask(true);
  gl.enable(gl.DEPTH_TEST);

  // --- Labels follow displaced tag positions ---
  updateLabels(mvp, eyeX, eyeY, eyeZ);
  updateTooltip(mvp, eyeX, eyeY, eyeZ);
}

// --- Fade in on load ---
setTimeout(() => {
  const overlay = document.getElementById('fade-overlay');
  if (overlay) overlay.classList.add('done');
}, 100);
// Remove overlay from DOM after transition
setTimeout(() => {
  const overlay = document.getElementById('fade-overlay');
  if (overlay) overlay.remove();
}, 2200);

requestAnimationFrame(render);
</script>
</body>
</html>
