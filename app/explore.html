<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>knod — explore</title>
	<style>
		*,
		*::before,
		*::after {
			box-sizing: border-box;
			margin: 0;
			padding: 0;
		}

		:root {
			--bg: #0d0d12;
			--bg2: #13131a;
			--bg3: #1a1a24;
			--border: rgba(100, 120, 200, 0.15);
			--border-hi: rgba(100, 140, 255, 0.35);
			--text: #c0c0d0;
			--text-dim: #60607a;
			--text-hi: #e0e0f0;
			--accent: #5577dd;
			--accent-hi: #7799ff;
			--green: #44bb88;
			--gold: #c0944a;
			--mono: 'SF Mono', 'Fira Code', 'Consolas', monospace;
		}

		html, body {
			height: 100%;
			background: var(--bg);
			color: var(--text);
			font-family: var(--mono);
			font-size: 13px;
			line-height: 1.5;
			overflow: hidden;
		}

		/* ── LAYOUT ──────────────────────────────────────── */
		#app {
			display: flex;
			flex-direction: column;
			height: 100vh;
		}

		#searchbar {
			display: flex;
			align-items: center;
			border-bottom: 1px solid var(--border);
			padding: 0 14px;
			gap: 10px;
			flex-shrink: 0;
			height: 38px;
		}

		#searchbar label {
			color: var(--text-dim);
			font-size: 11px;
			white-space: nowrap;
		}

		#search-input {
			flex: 1;
			background: transparent;
			border: none;
			outline: none;
			color: var(--text-hi);
			font-family: var(--mono);
			font-size: 13px;
			padding: 0;
			caret-color: var(--accent-hi);
		}

		#search-input::placeholder { color: var(--text-dim); }

		#search-clear {
			background: none;
			border: none;
			color: var(--text-dim);
			cursor: pointer;
			font-size: 16px;
			padding: 0 4px;
			line-height: 1;
			display: none;
		}

		#search-clear:hover { color: var(--text-hi); }

		#search-status {
			font-size: 11px;
			color: var(--text-dim);
			white-space: nowrap;
			min-width: 80px;
			text-align: right;
		}

		#columns {
			display: flex;
			flex: 1;
			overflow: hidden;
		}

		.col {
			display: flex;
			flex-direction: column;
			overflow: hidden;
			border-right: 1px solid var(--border);
		}

		#col-tree   { flex: 0 0 26%; }
		#col-conn   { flex: 0 0 36%; }
		#col-detail { flex: 1; border-right: none; }

		.col-header {
			padding: 6px 14px;
			font-size: 10px;
			letter-spacing: 0.1em;
			text-transform: uppercase;
			color: var(--text-dim);
			border-bottom: 1px solid var(--border);
			background: var(--bg);
			flex-shrink: 0;
			display: flex;
			align-items: center;
			justify-content: space-between;
		}

		.col-header-count {
			font-size: 10px;
			color: var(--text-dim);
			letter-spacing: 0;
			text-transform: none;
			opacity: 0.7;
		}

		.col-body {
			flex: 1;
			overflow-y: auto;
			overflow-x: hidden;
		}

		.col-body::-webkit-scrollbar { width: 4px; }
		.col-body::-webkit-scrollbar-track { background: transparent; }
		.col-body::-webkit-scrollbar-thumb {
			background: var(--border);
			border-radius: 2px;
		}

		/* ── TREE (left column) ──────────────────────────── */
		.tree-section {
			border-bottom: 1px solid var(--border);
		}

		.tree-root {
			display: flex;
			align-items: center;
			gap: 6px;
			padding: 8px 14px;
			color: var(--text-dim);
			font-size: 11px;
			letter-spacing: 0.05em;
			border-bottom: 1px solid var(--border);
			background: var(--bg);
		}

		.tree-root-name {
			color: var(--text);
			font-size: 12px;
			flex: 1;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.tree-tag {
			display: flex;
			align-items: center;
			gap: 0;
			cursor: pointer;
			transition: background 0.1s;
			position: relative;
			border-bottom: 1px solid var(--border);
		}

		.tree-tag:hover { background: var(--bg2); }

		.tree-tag.open { background: var(--bg2); }

		.tree-tag.selected {
			background: var(--bg3);
		}

		.tree-tag.selected::before {
			content: '';
			position: absolute;
			left: 0; top: 0; bottom: 0;
			width: 2px;
			background: var(--accent);
		}

		.tree-tag-toggle {
			width: 28px;
			display: flex;
			align-items: center;
			justify-content: center;
			color: var(--text-dim);
			font-size: 10px;
			flex-shrink: 0;
			padding: 10px 0;
			user-select: none;
		}

		.tree-tag-label {
			flex: 1;
			padding: 10px 14px 10px 0;
			color: var(--text-hi);
			font-size: 12px;
			overflow: hidden;
			text-overflow: ellipsis;
			white-space: nowrap;
		}

		.tree-tag-dim {
			font-size: 10px;
			color: var(--text-dim);
			padding-right: 10px;
		}

		/* thoughts nested under a tag */
		.tree-thoughts {
			background: var(--bg);
			display: none;
		}

		.tree-tag.open + .tree-thoughts {
			display: block;
		}

		.tree-thought {
			display: flex;
			align-items: flex-start;
			gap: 0;
			cursor: pointer;
			transition: background 0.1s;
			position: relative;
			border-bottom: 1px solid var(--border);
		}

		.tree-thought:hover { background: var(--bg2); }

		.tree-thought.selected {
			background: var(--bg3);
		}

		.tree-thought.selected::before {
			content: '';
			position: absolute;
			left: 0; top: 0; bottom: 0;
			width: 2px;
			background: var(--green);
		}

		.tree-thought-indent {
			width: 28px;
			flex-shrink: 0;
			display: flex;
			align-items: flex-start;
			justify-content: center;
			padding-top: 10px;
			color: var(--border-hi);
			font-size: 9px;
		}

		.tree-thought-text {
			flex: 1;
			padding: 8px 14px 8px 0;
			color: var(--text);
			font-size: 11px;
			line-height: 1.45;
		}

		/* ── CONNECTIONS (center column) ─────────────────── */
		.conn-item {
			display: flex;
			flex-direction: column;
			gap: 4px;
			padding: 11px 14px;
			cursor: pointer;
			border-bottom: 1px solid var(--border);
			transition: background 0.1s;
			position: relative;
		}

		.conn-item:hover { background: var(--bg2); }

		.conn-item.selected {
			background: var(--bg3);
		}

		.conn-item.selected::before {
			content: '';
			position: absolute;
			left: 0; top: 0; bottom: 0;
			width: 2px;
			background: var(--accent-hi);
		}

		.conn-item-text {
			color: var(--text-hi);
			font-size: 12px;
			line-height: 1.4;
		}

		.conn-item-meta {
			display: flex;
			gap: 8px;
			align-items: center;
			font-size: 10px;
			color: var(--text-dim);
		}

		.conn-dir-out { color: var(--accent-hi); }
		.conn-dir-in  { color: var(--green); }

		.conn-weight { color: var(--gold); }

		.conn-reasoning {
			font-size: 10px;
			color: var(--text-dim);
			line-height: 1.4;
			font-style: italic;
		}

		/* ── DETAIL (right column) ───────────────────────── */
		#detail-body {
			padding: 18px 18px;
		}

		.detail-kind {
			font-size: 9px;
			text-transform: uppercase;
			letter-spacing: 0.1em;
			color: var(--text-dim);
			margin-bottom: 10px;
		}

		.detail-text {
			color: var(--text-hi);
			font-size: 13px;
			line-height: 1.65;
			margin-bottom: 18px;
			word-break: break-word;
		}

		.detail-field {
			display: flex;
			gap: 10px;
			margin-bottom: 6px;
			font-size: 11px;
		}

		.detail-field-key {
			color: var(--text-dim);
			flex-shrink: 0;
			width: 90px;
		}

		.detail-field-val {
			color: var(--text);
			word-break: break-all;
		}

		.detail-divider {
			border: none;
			border-top: 1px solid var(--border);
			margin: 16px 0;
		}

		/* ── EMPTY / LOADING ─────────────────────────────── */
		.empty {
			padding: 28px 14px;
			color: var(--text-dim);
			font-size: 11px;
			text-align: center;
		}

		.loading {
			padding: 28px 14px;
			color: var(--text-dim);
			font-size: 11px;
			text-align: center;
			animation: pulse 1.4s ease-in-out infinite;
		}

		@keyframes pulse {
			0%, 100% { opacity: 0.35; }
			50%       { opacity: 0.85; }
		}

		/* ── ERROR BANNER ────────────────────────────────── */
		#error-banner {
			display: none;
			position: fixed;
			bottom: 14px;
			left: 50%;
			transform: translateX(-50%);
			background: rgba(204, 85, 102, 0.18);
			border: 1px solid rgba(204, 85, 102, 0.4);
			color: #ee7788;
			font-size: 11px;
			padding: 8px 16px;
			border-radius: 4px;
			z-index: 999;
			pointer-events: none;
			white-space: nowrap;
		}
	</style>
</head>

</div>

		{ id: 4,  score: 0.83, text: 'Hawksbill sea turtles feed almost exclusively on sponges, making them specialists in reef ecosystems and critical for maintaining reef biodiversity.',                 source_id: 'wikipedia/hawksbill'   },
		{ id: 12, score: 0.79, text: 'All seven species of sea turtle are listed as either vulnerable, endangered, or critically endangered on the IUCN Red List.',                                         source_id: 'iucn/sea_turtles'      },
	],
};

// ── STATE ────────────────────────────────────────────────────────────────────
const state = {
	graphInfo:   null,   // GET /graph
	thoughts:    null,   // GET /thoughts  (all thoughts, cached)
	openTags:    new Set(), // dim_index values of expanded tags

	// selected node: { kind: 'tag'|'thought', id, label }
	selected:    null,

	searching:   false,
	searchQuery: '',
};

// ── DOM ──────────────────────────────────────────────────────────────────────
const treeBody   = document.getElementById('tree-body');
const treeCount  = document.getElementById('tree-count');
const connBody   = document.getElementById('conn-body');
const connLabel  = document.getElementById('conn-label');
const connCount  = document.getElementById('conn-count');
const detailBody = document.getElementById('detail-body');
const detailLabel = document.getElementById('detail-label');
const searchInput  = document.getElementById('search-input');
const searchClear  = document.getElementById('search-clear');
const searchStatus = document.getElementById('search-status');
const errorBanner  = document.getElementById('error-banner');

// ── UTILS ────────────────────────────────────────────────────────────────────
function showError(msg) {
	errorBanner.textContent = msg;
	errorBanner.style.display = 'block';
	clearTimeout(showError._t);
	showError._t = setTimeout(() => { errorBanner.style.display = 'none'; }, 4500);
}

async function api(path) {
	if (USE_MOCK) {
		await new Promise(r => setTimeout(r, 40)); // simulate latency
		if (path === '/graph')    return structuredClone(MOCK['/graph']);
		if (path === '/thoughts') return structuredClone(MOCK['/thoughts']);
		if (path.startsWith('/thought/')) {
			const id = parseInt(path.slice('/thought/'.length));
			const t = MOCK.thoughts[id];
			if (!t) throw new Error(`thought ${id} not found`);
			return structuredClone(t);
		}
		if (path.startsWith('/find')) return structuredClone(MOCK.find);
		throw new Error(`unknown mock path: ${path}`);
	}
	const r = await fetch(API + path);
	if (!r.ok) throw new Error(`${r.status} ${r.statusText} (${path})`);
	return r.json();
}

function esc(s) {
	return String(s ?? '')
		.replace(/&/g, '&amp;').replace(/</g, '&lt;')
		.replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function trunc(s, n = 120) {
	if (!s) return '';
	s = s.replace(/\s+/g, ' ').trim();
	return s.length > n ? s.slice(0, n) + '…' : s;
}

// ── TREE (left column) ───────────────────────────────────────────────────────
async function renderTree() {
	treeBody.innerHTML = '<div class="loading">loading…</div>';
	try {
		if (!state.graphInfo) state.graphInfo = await api('/graph');
		if (!state.thoughts)  state.thoughts  = await api('/thoughts');

		const tags     = state.graphInfo.tags ?? [];
		const thoughts = state.thoughts;

		treeCount.textContent = `${tags.length} tags · ${thoughts.length} thoughts`;

		if (!tags.length && !thoughts.length) {
			treeBody.innerHTML = '<div class="empty">no data — ingest content first</div>';
			return;
		}

		// Root node
		let html = `<div class="tree-root">
			<span class="tree-root-name">${esc(state.graphInfo.purpose || 'store')}</span>
		</div>`;

		// Tags + their thoughts
		for (const tag of tags) {
			const isOpen     = state.openTags.has(tag.dim_index);
			const isSelected = state.selected?.kind === 'tag' && state.selected.id === tag.dim_index;
			const toggle     = isOpen ? '▾' : '▸';

			html += `<div class="tree-section">
				<div class="tree-tag${isOpen ? ' open' : ''}${isSelected ? ' selected' : ''}"
				     data-tag="${tag.dim_index}">
					<div class="tree-tag-toggle">${toggle}</div>
					<div class="tree-tag-label">${esc(tag.label || `dim ${tag.dim_index}`)}</div>
					<div class="tree-tag-dim">${tag.dim_index}</div>
				</div>`;

			if (isOpen) {
				// Thoughts that belong to this tag: sort by affinity desc
				// affinity = thought.embedding[tag.dim_index]  (not available in /thoughts list)
				// Fall back to showing all thoughts — filter by access_count or just show all
				// TODO: use /thoughts?tag=dim_index once that endpoint exists
				const tagThoughts = thoughts.slice().sort((a, b) => (b.access_count ?? 0) - (a.access_count ?? 0));
				html += `<div class="tree-thoughts">`;
				for (const t of tagThoughts) {
					const isSel = state.selected?.kind === 'thought' && state.selected.id === t.id;
					html += `<div class="tree-thought${isSel ? ' selected' : ''}"
					              data-thought="${t.id}" data-tag="${tag.dim_index}">
						<div class="tree-thought-indent">·</div>
						<div class="tree-thought-text">${esc(trunc(t.text, 90))}</div>
					</div>`;
				}
				html += `</div>`;
			} else {
				html += `<div class="tree-thoughts"></div>`;
			}

			html += `</div>`; // .tree-section
		}

		treeBody.innerHTML = html;
		bindTreeEvents();

		// Scroll selected thought into view
		const sel = treeBody.querySelector('.tree-thought.selected, .tree-tag.selected');
		if (sel) sel.scrollIntoView({ block: 'nearest' });

	} catch (e) {
		treeBody.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`;
		showError(e.message);
	}
}

function bindTreeEvents() {
	// Tag click: toggle open + select tag
	treeBody.querySelectorAll('.tree-tag').forEach(el => {
		el.addEventListener('click', () => {
			const dimIndex = parseInt(el.dataset.tag);
			const tag = state.graphInfo.tags.find(t => t.dim_index === dimIndex);
			if (!tag) return;

			// Toggle open
			if (state.openTags.has(dimIndex)) {
				state.openTags.delete(dimIndex);
			} else {
				state.openTags.add(dimIndex);
			}

			// Select the tag
			selectNode({ kind: 'tag', id: dimIndex, label: tag.label || `dim ${dimIndex}` });
		});
	});

	// Thought click: select thought
	treeBody.querySelectorAll('.tree-thought').forEach(el => {
		el.addEventListener('click', e => {
			e.stopPropagation();
			const id = parseInt(el.dataset.thought);
			const t  = state.thoughts.find(x => x.id === id);
			if (!t) return;
			selectNode({ kind: 'thought', id, label: trunc(t.text, 80) });
		});
	});
}

// ── SELECT NODE ──────────────────────────────────────────────────────────────
function selectNode(node) {
	state.selected = node;
	renderTree();
	renderConnections();
	renderDetail();
}

// ── CONNECTIONS (center column) ──────────────────────────────────────────────
async function renderConnections() {
	const node = state.selected;

	if (!node) {
		connLabel.textContent = 'connections';
		connCount.textContent = '';
		connBody.innerHTML = '<div class="empty">select a node to see its connections</div>';
		return;
	}

	if (node.kind === 'tag') {
		// For a tag, show its top thoughts as connections (by affinity proxy)
		connLabel.textContent = 'thoughts in tag';
		connBody.innerHTML = '<div class="loading">loading…</div>';
		try {
			if (!state.thoughts) state.thoughts = await api('/thoughts');
			const all = state.thoughts;
			connCount.textContent = `${all.length}`;
			if (!all.length) {
				connBody.innerHTML = '<div class="empty">no thoughts</div>';
				return;
			}
			connBody.innerHTML = all.map(t => {
				const isSel = state.selected?.kind === 'thought' && state.selected.id === t.id;
				return `<div class="conn-item${isSel ? ' selected' : ''}" data-id="${t.id}" data-kind="thought">
					<div class="conn-item-text">${esc(trunc(t.text, 100))}</div>
					<div class="conn-item-meta">
						<span>id ${t.id}</span>
						${t.access_count ? `<span>${t.access_count}×</span>` : ''}
					</div>
				</div>`;
			}).join('');
			bindConnEvents();
		} catch (e) {
			connBody.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`;
			showError(e.message);
		}
		return;
	}

	if (node.kind === 'thought') {
		connLabel.textContent = 'connections';
		connBody.innerHTML = '<div class="loading">loading…</div>';
		connCount.textContent = '';
		try {
			const detail = await api(`/thought/${node.id}`);
			const out = (detail.outgoing ?? []).map(e => ({ ...e, dir: 'out', otherId: e.target_id }));
			const inc = (detail.incoming ?? []).map(e => ({ ...e, dir: 'in',  otherId: e.source_id }));
			const edges = [...out, ...inc].sort((a, b) => (b.weight ?? 0) - (a.weight ?? 0));

			connCount.textContent = edges.length ? `${edges.length}` : '';

			if (!edges.length) {
				connBody.innerHTML = '<div class="empty">no connections</div>';
				return;
			}

			connBody.innerHTML = edges.map(e => {
				const dirCls  = e.dir === 'out' ? 'conn-dir-out' : 'conn-dir-in';
				const arrow   = e.dir === 'out' ? '→' : '←';
				const pct     = Math.round((e.weight ?? 0) * 100);
				// Fetch the other node's text from cache
				const other   = state.thoughts?.find(t => t.id === e.otherId);
				const preview = other ? trunc(other.text, 90) : `thought ${e.otherId}`;
				const reasoning = e.reasoning ? trunc(e.reasoning, 100) : null;
				return `<div class="conn-item" data-id="${e.otherId}" data-kind="thought">
					<div class="conn-item-text">${esc(preview)}</div>
					${reasoning ? `<div class="conn-reasoning">${esc(reasoning)}</div>` : ''}
					<div class="conn-item-meta">
						<span class="${dirCls}">${arrow} ${e.otherId}</span>
						<span class="conn-weight">${pct}%</span>
					</div>
				</div>`;
			}).join('');
			bindConnEvents();
		} catch (e) {
			connBody.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`;
			showError(e.message);
		}
	}
}

function bindConnEvents() {
	connBody.querySelectorAll('.conn-item[data-id]').forEach(el => {
		el.addEventListener('click', () => {
			const id   = parseInt(el.dataset.id);
			const t    = state.thoughts?.find(x => x.id === id);
			const label = t ? trunc(t.text, 80) : `thought ${id}`;
			selectNode({ kind: 'thought', id, label });
		});
	});
}

// ── DETAIL (right column) ────────────────────────────────────────────────────
async function renderDetail() {
	const node = state.selected;

	if (!node) {
		detailLabel.textContent = 'detail';
		detailBody.innerHTML = '<div class="empty">select a node</div>';
		return;
	}

	if (node.kind === 'tag') {
		detailLabel.textContent = 'tag';
		const tag = state.graphInfo?.tags?.find(t => t.dim_index === node.id);
		detailBody.innerHTML = `
			<div class="detail-kind">tag · embedding dimension</div>
			<div class="detail-text">${esc(tag?.label || `dim ${node.id}`)}</div>
			<hr class="detail-divider">
			<div class="detail-field">
				<div class="detail-field-key">dim index</div>
				<div class="detail-field-val">${node.id}</div>
			</div>
		`;
		return;
	}

	if (node.kind === 'thought') {
		detailLabel.textContent = 'thought';
		detailBody.innerHTML = '<div class="loading">loading…</div>';
		try {
			const detail = await api(`/thought/${node.id}`);
			const t = detail.thought ?? detail;
			const outCount = (detail.outgoing ?? []).length;
			const inCount  = (detail.incoming ?? []).length;

			let html = `
				<div class="detail-kind">thought</div>
				<div class="detail-text">${esc(t.text ?? '')}</div>
				<hr class="detail-divider">
				<div class="detail-field">
					<div class="detail-field-key">id</div>
					<div class="detail-field-val">${t.id}</div>
				</div>
				<div class="detail-field">
					<div class="detail-field-key">connections</div>
					<div class="detail-field-val">${outCount} out · ${inCount} in</div>
				</div>
				<div class="detail-field">
					<div class="detail-field-key">access count</div>
					<div class="detail-field-val">${t.access_count ?? 0}</div>
				</div>
			`;
			if (t.source_id) {
				html += `<div class="detail-field">
					<div class="detail-field-key">source</div>
					<div class="detail-field-val">${esc(t.source_id)}</div>
				</div>`;
			}
			if (t.created_at) {
				html += `<div class="detail-field">
					<div class="detail-field-key">created</div>
					<div class="detail-field-val">${new Date(t.created_at * 1000).toLocaleString()}</div>
				</div>`;
			}
			detailBody.innerHTML = html;
		} catch (e) {
			detailBody.innerHTML = `<div class="empty">error: ${esc(e.message)}</div>`;
			showError(e.message);
		}
	}
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
let searchTimer = null;

searchInput.addEventListener('input', () => {
	const q = searchInput.value.trim();
	searchClear.style.display = q ? 'block' : 'none';
	clearTimeout(searchTimer);
	if (!q) { exitSearch(); return; }
	searchStatus.textContent = 'searching…';
	searchTimer = setTimeout(() => doSearch(q), SEARCH_DEBOUNCE);
});

searchClear.addEventListener('click', () => {
	searchInput.value = '';
	searchClear.style.display = 'none';
	exitSearch();
	searchInput.focus();
});

function exitSearch() {
	if (!state.searching) return;
	state.searching = false;
	state.searchQuery = '';
	searchStatus.textContent = '';
	connLabel.textContent = 'connections';
	connCount.textContent = '';
	renderConnections();
}

async function doSearch(q) {
	state.searching = true;
	state.searchQuery = q;
	connLabel.textContent = 'search results';
	connBody.innerHTML = '<div class="loading">searching…</div>';
	connCount.textContent = '';
	try {
		const results = await api(`/find?q=${encodeURIComponent(q)}`);
		searchStatus.textContent = `${results.length} result${results.length !== 1 ? 's' : ''}`;
		connCount.textContent = `${results.length}`;

		if (!results.length) {
			connBody.innerHTML = '<div class="empty">no results</div>';
			return;
		}

		connBody.innerHTML = results.map(r => {
			const pct = r.score != null ? Math.round(r.score * 100) : null;
			return `<div class="conn-item" data-id="${r.id}" data-kind="thought">
				<div class="conn-item-text">${esc(trunc(r.text, 100))}</div>
				<div class="conn-item-meta">
					<span>id ${r.id}</span>
					${pct != null ? `<span class="conn-weight">${pct}%</span>` : ''}
				</div>
			</div>`;
		}).join('');

		connBody.querySelectorAll('.conn-item[data-id]').forEach(el => {
			el.addEventListener('click', () => {
				const id  = parseInt(el.dataset.id);
				const r   = results.find(x => x.id === id);
				const label = r ? trunc(r.text, 80) : `thought ${id}`;
				// Also open the tag that contains this thought, if tree has one selected
				selectNode({ kind: 'thought', id, label });
			});
		});
	} catch (e) {
		state.searching = false;
		searchStatus.textContent = 'error';
		connBody.innerHTML = `<div class="empty">search failed: ${esc(e.message)}</div>`;
		showError(e.message);
	}
}

// ── INIT ─────────────────────────────────────────────────────────────────────
async function init() {
	try {
		state.graphInfo = await api('/graph');
		state.thoughts  = await api('/thoughts');
	} catch (e) {
		showError(`backend unavailable — ${e.message}`);
	}
	renderTree();
	renderConnections();
	renderDetail();
}

init();
</script>
</body>
</html>
