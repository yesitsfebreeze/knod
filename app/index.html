<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>knod — specialist space</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #0a0a0f;
  color: #c8c8d0;
  font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
  overflow: hidden;
  width: 100vw;
  height: 100vh;
}
canvas { display: block; }
#info {
  position: absolute;
  top: 16px;
  left: 16px;
  font-size: 12px;
  line-height: 1.6;
  pointer-events: none;
  opacity: 0.7;
}
#info h1 { font-size: 14px; color: #e0e0e8; margin-bottom: 4px; }
#tooltip {
  position: absolute;
  display: block;
  opacity: 0;
  background: rgba(10, 10, 20, 0.92);
  border: 1px solid rgba(100, 140, 255, 0.3);
  padding: 8px 12px;
  font-size: 11px;
  line-height: 1.5;
  max-width: 380px;
  pointer-events: none;
  border-radius: 4px;
  backdrop-filter: blur(8px);
  transition: opacity 0.2s ease;
  z-index: 600;
}
#tooltip .label { color: #8cb4ff; font-weight: bold; }
#tooltip .detail { color: #a0a0b0; }
#tooltip .source { color: #7a9ab8; font-size: 10px; margin-top: 2px; }
#tooltip .connections { color: #b8a070; font-size: 10px; margin-top: 4px; border-top: 1px solid rgba(100, 140, 255, 0.15); padding-top: 4px; }
#tooltip .connections .edge-item { margin-top: 2px; }
#controls {
  position: absolute;
  bottom: 16px;
  left: 16px;
  font-size: 11px;
  opacity: 0.5;
}
#legend {
  position: absolute;
  top: 16px;
  right: 16px;
  font-size: 11px;
  opacity: 0.7;
}
#legend div { margin-bottom: 4px; }
#legend .dot {
  display: inline-block;
  width: 8px; height: 8px;
  border-radius: 50%;
  margin-right: 6px;
  vertical-align: middle;
}
#fade-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: #0a0a0f;
  pointer-events: none;
  z-index: 9999;
  opacity: 1;
  transition: opacity 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}
#fade-overlay.done { opacity: 0; }

/* --- Settings panel --- */
#panel-toggle {
  position: fixed;
  top: 12px;
  right: 12px;
  z-index: 1001;
  width: 32px; height: 32px;
  border: 1px solid rgba(200, 200, 210, 0.2);
  border-radius: 6px;
  background: rgba(10, 10, 20, 0.7);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  color: inherit;
  font-size: 16px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, border-color 0.2s, right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
}
#panel-toggle:hover { background: rgba(30, 30, 50, 0.85); border-color: rgba(200, 200, 210, 0.35); }
#panel-toggle.open { right: 312px; }

#settings-panel {
  position: fixed;
  top: 0; right: 0;
  width: 300px; height: 100vh;
  z-index: 1000;
  background: rgba(8, 8, 16, 0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-left: 1px solid rgba(200, 200, 210, 0.1);
  transform: translateX(100%);
  transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-y: auto;
  overflow-x: hidden;
  padding: 16px 14px 32px;
  font-size: 11px;
  scrollbar-width: thin;
  scrollbar-color: rgba(200,200,210,0.15) transparent;
}
#settings-panel.open { transform: translateX(0); }
#settings-panel::-webkit-scrollbar { width: 5px; }
#settings-panel::-webkit-scrollbar-thumb { background: rgba(200,200,210,0.15); border-radius: 4px; }

.panel-heading {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 1.2px;
  opacity: 0.5;
  margin: 18px 0 8px;
  user-select: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
}
.panel-heading:first-child { margin-top: 4px; }
.panel-heading::before {
  content: '\25BE';
  font-size: 9px;
  transition: transform 0.25s;
  display: inline-block;
}
.panel-heading.collapsed::before { transform: rotate(-90deg); }

.panel-section {
  overflow: hidden;
  transition: max-height 0.3s ease, opacity 0.25s ease;
  max-height: 800px;
  opacity: 1;
}
.panel-section.collapsed {
  max-height: 0;
  opacity: 0;
}

.slider-row {
  display: flex;
  align-items: center;
  margin: 5px 0;
  gap: 8px;
}
.slider-row label {
  flex: 0 0 90px;
  opacity: 0.7;
  font-size: 10px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.slider-row input[type=range] {
  flex: 1;
  height: 3px;
  -webkit-appearance: none;
  appearance: none;
  background: rgba(200, 200, 210, 0.15);
  border-radius: 2px;
  outline: none;
}
.slider-row input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(200, 200, 210, 0.6);
  cursor: pointer;
  border: none;
}
.slider-row input[type=range]::-moz-range-thumb {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: rgba(200, 200, 210, 0.6);
  cursor: pointer;
  border: none;
}
.slider-row .val {
  flex: 0 0 auto;
  min-width: 34px;
  text-align: right;
  font-size: 10px;
  opacity: 0.5;
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
}

/* Palette swatches */
.palette-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr);
  gap: 3px;
  margin: 6px 0 2px;
}
.palette-swatch {
  aspect-ratio: 1;
  border-radius: 3px;
  border: 1px solid rgba(200, 200, 210, 0.08);
  cursor: default;
  position: relative;
  font-size: 7px;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 2px;
  opacity: 0.7;
  color: rgba(200,200,210,0.6);
}
.palette-swatch:hover { opacity: 1; border-color: rgba(200, 200, 210, 0.3); }

/* Color mapping row: label + clickable swatches for picking a palette slot */
.color-map-row {
  display: flex;
  align-items: center;
  margin: 4px 0;
  gap: 6px;
}
.color-map-row .cmap-label {
  flex: 0 0 48px;
  font-size: 10px;
  opacity: 0.6;
}
.color-map-row .cmap-swatches {
  display: flex;
  gap: 2px;
  flex: 1;
}
.color-map-row .cmap-swatch {
  width: 16px; height: 16px;
  border-radius: 3px;
  border: 1px solid rgba(200, 200, 210, 0.08);
  cursor: pointer;
  opacity: 0.5;
  transition: opacity 0.15s, border-color 0.15s, transform 0.15s;
}
.color-map-row .cmap-swatch:hover { opacity: 0.9; border-color: rgba(200, 200, 210, 0.4); }
.color-map-row .cmap-swatch.selected {
  opacity: 1;
  border-color: rgba(255, 255, 255, 0.7);
  transform: scale(1.15);
}

/* Theme selector */
.theme-list {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin: 6px 0;
}
.theme-btn {
  padding: 3px 8px;
  font-size: 10px;
  border: 1px solid rgba(200, 200, 210, 0.15);
  border-radius: 4px;
  background: transparent;
  color: inherit;
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s;
  font-family: inherit;
}
.theme-btn:hover { background: rgba(200, 200, 210, 0.08); border-color: rgba(200, 200, 210, 0.3); }
.theme-btn.active { background: rgba(200, 200, 210, 0.12); border-color: rgba(200, 200, 210, 0.4); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="fade-overlay"></div>

<div id="info">
  <h1 id="store-name">knod galaxy</h1>
  <div id="store-purpose">specialist knowledge graph</div>
  <div id="store-stats"></div>
</div>

<div id="tooltip">
  <div class="label"></div>
  <div class="detail"></div>
  <div class="source"></div>
  <div class="connections"></div>
</div>

<div id="legend">
  <div><span class="dot" style="background:#448888"></span>old / root</div>
  <div><span class="dot" style="background:#dd6644"></span>recent</div>
  <div><span class="dot" style="background:#c8c8d0"></span>stems</div>
  <div><span class="dot" style="background:#6688aa"></span>bridge tags</div>
  <div style="margin-top:4px;font-size:10px;opacity:0.6">25 specialists · shared tags as bridges</div>
</div>

<button id="panel-toggle" title="Settings">&#9881;</button>

<div id="settings-panel">
  <!-- Theme / Palette -->
  <div class="panel-heading" data-section="palette">palette</div>
  <div class="panel-section" id="sec-palette">
    <div class="theme-list" id="theme-list"></div>
    <div class="palette-grid" id="palette-grid"></div>
    <div class="color-map-row" style="margin-top:8px">
      <span class="cmap-label">old</span>
      <div class="cmap-swatches" id="cmap-old"></div>
    </div>
    <div class="color-map-row">
      <span class="cmap-label">recent</span>
      <div class="cmap-swatches" id="cmap-recent"></div>
    </div>
    <div class="color-map-row">
      <span class="cmap-label">stems</span>
      <div class="cmap-swatches" id="cmap-stem"></div>
    </div>
  </div>

  <!-- Opacity Controls -->
  <div class="panel-heading" data-section="opacity">opacity</div>
  <div class="panel-section" id="sec-opacity">
    <div class="slider-row">
      <label>all lines</label>
      <input type="range" min="0" max="100" value="100" id="op-edges">
      <span class="val" id="op-edges-val">1.00</span>
    </div>
    <div class="slider-row">
      <label>recency bias</label>
      <input type="range" min="0" max="100" value="50" id="op-recent-edges">
      <span class="val" id="op-recent-edges-val">0.50</span>
    </div>
    <div class="slider-row">
      <label>stems</label>
      <input type="range" min="0" max="100" value="100" id="op-stems">
      <span class="val" id="op-stems-val">1.00</span>
    </div>
    <div class="slider-row">
      <label>glow</label>
      <input type="range" min="0" max="100" value="100" id="op-glow">
      <span class="val" id="op-glow-val">1.00</span>
    </div>
    <div class="slider-row">
      <label>dot size</label>
      <input type="range" min="0" max="100" value="100" id="op-dots">
      <span class="val" id="op-dots-val">1.00</span>
    </div>
    <div class="slider-row">
      <label>labels</label>
      <input type="range" min="0" max="100" value="100" id="op-labels">
      <span class="val" id="op-labels-val">1.00</span>
    </div>
  </div>

  <!-- Physics Controls -->
  <div class="panel-heading" data-section="physics">physics</div>
  <div class="panel-section" id="sec-physics">
    <div class="slider-row">
      <label>stiffness bias</label>
      <input type="range" min="0" max="100" value="63" id="ph-stiffness">
      <span class="val" id="ph-stiffness-val"></span>
    </div>
    <div class="slider-row">
      <label>reactivity</label>
      <input type="range" min="0" max="100" value="70" id="ph-reactivity">
      <span class="val" id="ph-reactivity-val">0.70</span>
    </div>
  </div>

  <!-- Camera -->
  <div class="panel-heading" data-section="camera">camera</div>
  <div class="panel-section" id="sec-camera">
    <div class="slider-row">
      <label>zoom</label>
      <input type="range" min="0" max="100" value="35" id="cam-zoom">
      <span class="val" id="cam-zoom-val">6.0</span>
    </div>
    <div class="slider-row">
      <label>dof range</label>
      <input type="range" min="0" max="100" value="50" id="cam-dof">
      <span class="val" id="cam-dof-val">3.50</span>
    </div>
  </div>
</div>

<div id="controls">
  drag to rotate · scroll to zoom · hover for details
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
