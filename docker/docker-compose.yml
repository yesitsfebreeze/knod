services:
  shard-proxy:
    image: nginx:alpine
    container_name: shard-proxy
    ports:
      - "80:80"
      - "443:443"
      - "7777:7777"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - shard-app
    restart: unless-stopped

  shard-app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: shard-app
    command: ["python3", "-m", "shard", "serve", "--mcp-transport", "streamable-http", "--mcp-port", "8766"]
    ports:
      - "7999:7999"
      - "8766:8766"
    environment:
      - SHARD_HTTP_PORT=8080
      - SHARD_TCP_PORT=7999
    volumes:
      - ../config:/config:ro
      - ../shard/web:/shard/web:rw
      - ../.shard:/.shard
    restart: unless-stopped

